      const status = err && typeof err.status === "number" ? err.status : null;
      const msg = String((err && err.message) || err || "");
      /* Fallback SAMO ob napaki nalaganja lokalnega sloga — ne ob napakah ploščic. */
      const isLocalStyleRequest =
        url.indexOf("strelko-dark") !== -1 ||
        (url.indexOf("/data/") !== -1 && url.indexOf("strelko-dark") !== -1);
      const isLoadFail =
        status === 404 ||
        status === 403 ||
        status === 500 ||
        /Failed to (fetch|load)|AJAXError|status 4\d\d/i.test(msg);
      if (!isLocalStyleRequest || !isLoadFail) {
        return;
      }
      if (styleFallbackDone || localStyleOk) return;
      styleFallbackDone = true;
      lastAppliedStyleName = null;
      console.warn(
        "[map-embed] Lokalni slog ni naložen (status/url):",
        status,
        url,
        "— fallback OpenFreeMap Dark."
      );
      try {
        glMap.setStyle(OPENFREEMAP_DARK_STYLE);
      } catch (fallbackErr) {
        console.warn("[map-embed] Fallback na OpenFreeMap Dark ni uspel:", fallbackErr);
      }
    });
  }

  /* ——— Leaflet setup ——— */
  const GRID_MIN_ZOOM = 7;
  const map = L.map("map", {
    center: [46.12, 14.82],
    zoom: 8,
    minZoom: isPublicMapEmbed() ? PUBLIC_MIN_ZOOM : 7,
    maxZoom: 11,
    attributionControl: false,
    zoomControl: false,
    dragging: false,
    doubleClickZoom: false,
    scrollWheelZoom: false,
    boxZoom: false,
    keyboard: false,
    touchZoom: true,
    ...(isPublicMapEmbed()
      ? { zoomSnap: 0.5, zoomDelta: 0.5 }
      : mobView
        ? {}
        : { zoomSnap: 0, zoomDelta: 0.5 }),
  });

  const attributionControl = L.control.attribution({
    prefix: false,
    position: "bottomright",
  }).addTo(map);
  attributionControl.addAttribution(
    USE_OPENFREEMAP_BASE ? STRELKO_BASEMAP_ATTRIBUTION : MAPTILER_BASEMAP_ATTRIBUTION
  );

  function ensureAttributionLinkTargets() {
    const root = map.getContainer().querySelector(".leaflet-control-attribution");
    if (!root) return;
    root.querySelectorAll("a").forEach(function (a) {
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener noreferrer");
    });
  }
  ensureAttributionLinkTargets();
  (function watchAttributionLinks() {
    const root = map.getContainer().querySelector(".leaflet-control-attribution");
    if (!root || typeof MutationObserver !== "function") return;
    const obs = new MutationObserver(function () {
      ensureAttributionLinkTargets();
    });
    obs.observe(root, { childList: true, subtree: true, characterData: true });
  })();

  const OBCINE_MIN_ZOOM = map.getMinZoom();

  function applyGridMinZoom() {
    map.setMinZoom(GRID_MIN_ZOOM);
    if (map.getZoom() < GRID_MIN_ZOOM) {
      map.setZoom(GRID_MIN_ZOOM, { animate: false });
    }
  }

  function restoreObcineMinZoom() {
    map.setMinZoom(OBCINE_MIN_ZOOM);
  }

  let gridMapPanesReady = false;
  function ensureGridMapPanes() {
    if (gridMapPanesReady) return;
    const specs = [
      ["gridBasePane", 405],
      ["gridStrikePane", 415],
      ["gridHoverPane", 425],
      ["gridSelectedPane", 435],
    ];
    specs.forEach(function (spec) {
      const name = spec[0];
      const z = spec[1];
      if (!map.getPane(name)) {
        map.createPane(name);
      }
      const pane = map.getPane(name);
      pane.style.zIndex = String(z);
      pane.style.pointerEvents = "none";
    });
    gridMapPanesReady = true;
  }

  const baseTileLayer = USE_OPENFREEMAP_BASE
    ? createOpenFreeMapBaseLayer()
    : createMapTilerBaseLayer();
  baseTileLayer.addTo(map);

  function resizeMaplibreBasemap() {
    try {
      if (typeof baseTileLayer.getMaplibreMap !== "function") return;
      const glMap = baseTileLayer.getMaplibreMap();
      if (glMap && typeof glMap.resize === "function") glMap.resize();
    } catch (_) {}
  }

  if (USE_OPENFREEMAP_BASE && typeof baseTileLayer.getMaplibreMap === "function") {
    const glMap = baseTileLayer.getMaplibreMap();
    if (glMap) {
      attachOpenFreeMapStyleFallback(glMap);
    }
  }

  if (isPublicMapEmbed()) {
    map.on("dragstart", () => lockPublicUserViewport());
    map.on("zoomstart", (ev) => lockPublicUserViewport(ev));
    /* Wheel lock tudi, če so aktivne mobilne geste (brez fine pointerja). */
    map.getContainer().addEventListener(
      "wheel",
      function () { lockPublicUserViewport(); },
      { capture: true, passive: true }
    );
  } else if (mobView) {
    map.on("dragstart", () => lockMobileUserViewport());
    map.on("zoomstart", (ev) => lockMobileUserViewport(ev));
  }

  let desktopGesturesBound = false;
  function ensureDesktopMapGestures() {
    const hostEl = document.getElementById("map-stage");
    if (!map || !hostEl) return;
    if (shouldBindMobileMapGestures()) {
      if (!mobileGesturesBound) {
        bindMobileMapGestures(map, hostEl);
        mobileGesturesBound = true;
      }
      return;
    }
    if (desktopGesturesBound) return;
    bindMapZoomGestures(map, hostEl);
    desktopGesturesBound = true;
  }
  function scheduleDesktopMapGestures() {
    ensureDesktopMapGestures();
    if (shouldBindMobileMapGestures()) return;
    if (!desktopGesturesBound) {
      requestAnimationFrame(scheduleDesktopMapGestures);
    }
  }
  scheduleDesktopMapGestures();
  if (!isPublicMapEmbed() && !mobView) {
    map.on("dragstart", lockDesktopUserViewport);
    map.on("zoomstart", lockDesktopUserViewport);
  }


  try {
    const fineMq = window.matchMedia("(any-pointer: fine)");
    const onPointerMq = () => {
      desktopGesturesBound = false;
      mobileGesturesBound = false;
      if (map) {
        map.__streleDesktopGestures = false;
        map.__streleMobileGestures = false;
      }
      ensureDesktopMapGestures();
    };
    if (typeof fineMq.addEventListener === "function") {
      fineMq.addEventListener("change", onPointerMq);
    } else if (typeof fineMq.addListener === "function") {
      fineMq.addListener(onPointerMq);
    }
  } catch (_) {}

  /* ——— Legend control ——— */
  const legendControl = L.control({ position: "bottomright" });
  legendControl.onAdd = function () {
    const div = L.DomUtil.create("div");
    div.id = "legend";
    return div;
  };
  legendControl.addTo(map);

  let _lastReportedH = 0;
  let _resizeTimer = null;

  function scheduleMapResize() {
    requestAnimationFrame(() => {
      map.invalidateSize({ pan: false });
      resizeMaplibreBasemap();
      if (isPublicMapEmbed()) {
        /* Do ročnega zooma/premika: ponovno fitBounds + boost po širini vsebnika. */
        if (!publicUserViewportLocked) schedulePublicMapViewport();
      } else if (!isMobileView()) {
        /* Ne ponastavi zoom/središča po uporabniškem zoomanju — samo invalidateSize. */
        if (!deskUserViewportLocked) applyMapViewport();
      } else {
        scheduleMobileMapViewport();
      }
      notifyResize();
      resizeDailyChart();
    });
  }

  function notifyResizeOnce() {
    notifyResize(true);
  }

  function clearEmbedFocus() {
    const ae = document.activeElement;
    if (ae && ae !== document.body && ae !== document.documentElement && typeof ae.blur === "function") {
      ae.blur();
    }
  }

  function notifyResize(force) {
    if (window.parent === window) return;
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(() => {
      const root = document.getElementById("root");
      const h = Math.ceil(root ? root.getBoundingClientRect().height : 0);
      const unchanged = Math.abs(h - _lastReportedH) < 3;
      /* force only skips debounce; never rewrite parent height when size is stable —
         rewriting iframe height can shift the parent page scroll position. */
      if (unchanged && !force) return;
      if (!unchanged) {
        _lastReportedH = h;
        window.parent.postMessage({ type: "strele-embed-resize", height: h }, "*");
      }
      resizeDailyChart();
    }, force ? 0 : 80);
  }

  window.addEventListener("resize", () => {
    scheduleMapResize();
    ensureDesktopMapGestures();
  });
  window.addEventListener("message", (ev) => {
    if (ev.data && ev.data.type === "strele-map-visible") {
      scheduleMapResize();
      resizeDailyChart();
      scheduleDesktopMapGestures();
    }
  });
  if (typeof ResizeObserver !== "undefined") {
    const roRoot = document.getElementById("root") || document.body;
    const ro = new ResizeObserver(() => scheduleMapResize());
    if (roRoot) ro.observe(roRoot);
    const mapStage = document.getElementById("map-stage");
    if (mapStage) ro.observe(mapStage);
  }
  scheduleMapResize();
  notifyResizeOnce();

  /* ——— Country borders (pre-clipped; no Slovenia outline) ——— */
  let _countryBordersLoaded = false;

  function loadCountryBorders() {
    if (_countryBordersLoaded) return;
    _countryBordersLoaded = true;
    void fetch(apiUrl("/public/data/meje_drzav_brez_si.geojson"))
      .then(r => r.ok ? r.json() : null)
      .then(gj => {
        if (!gj) return;
        L.geoJSON(gj, {
          smoothFactor: mobView ? 1 : 0,
          style: { color: "#c5c9ce", weight: 1, opacity: 0.55, fill: false },
          interactive: false,
        }).addTo(map).bringToBack();
      })
      .catch(() => {});
  }
  loadCountryBorders();

  /* ——— State ——— */
  let geojsonLayer = null;
  let obcinaData   = {};   /* ob_id (string) → { name, stevilo, pov_km2 } */
  let geojson      = null;

  /* ——— UI refs ——— */
  const sel           = document.getElementById("daysSelect");
  const dayPickWrap   = document.getElementById("mapDayPickWrap");
  const dayPick       = document.getElementById("mapDayPick");
  const periodLabelEl = document.getElementById("periodLabel");
  let periodLabelNode = periodLabelEl;
  const statusEl      = document.getElementById("status");
  const mapViewGridBtn = document.getElementById("mapViewGridBtn");
  const mapFeatureLock = document.getElementById("map-feature-lock");
  const mapFeatureLockTitle = document.getElementById("mapFeatureLockTitle");
  const mapFeatureLockText = document.getElementById("mapFeatureLockText");

  const LOCK_COPY_PERIOD = {
    title: "Ta vsebina je na voljo s paketom Podpornik",
    text: "Z aktivacijo paketa Podpornik pridobite dostop do dodatnih prikazov, hkrati pa podprete ekipo Meteoinfo pri razvoju novih aplikacij in meteoroloških produktov.",
  };
  const LOCK_COPY_GRID = {
    title: "Ta prikaz je na voljo s paketom Podpornik",
    text: "Z mrežo 1 × 1 km lahko podrobneje analizirate prostorsko razporeditev in gostoto udarov strel.",
  };

  dayPick.max = todayIso();

  function isFreePeriodSelectValue(value) {
    return value === "1" || value === "7";
  }

  /**
   * Enotno pravilo (brez shranjenega lockedReason iz mreže):
   * isPeriodLocked(viewMode, period, hasActiveSupporter)
   */
  function isPeriodLocked(viewMode, periodValue, supporter) {
    if (supporter) return false;
    if (viewMode === "grid") return true;
    if (periodValue == null || periodValue === "") return false;
    return !isFreePeriodSelectValue(String(periodValue));
  }

  /** gridLocked = viewMode === "grid" && !hasActiveSupporter */
  function isGridLocked() {
    return mapView === "grid" && !hasSupporterAccess;
  }

  function isPeriodSelectValueLocked(value) {
    return isPeriodLocked(mapView, value, hasSupporterAccess);
  }

  function isUnderlyingPeriodLocked() {
    if (hasSupporterAccess) return false;
    if (isGridLocked()) return true;
    if (customRange || periodMode === "day") return true;
    return isPeriodLocked("obcine", String(days), false);
  }

  function currentUiPeriodValue() {
    if (sel && sel.value) return String(sel.value);
    if (periodLockUiValue) return String(periodLockUiValue);
    if (customRange || periodMode === "day") return "custom";
    return String(days);
  }

  function applyFeatureLockCopy(copy) {
    if (mapFeatureLockTitle) mapFeatureLockTitle.textContent = copy.title;
    if (mapFeatureLockText) mapFeatureLockText.textContent = copy.text;
  }

  function showPeriodLockUi(selectValue) {
    /* Na mreži ne shranjuj periodLock za Danes/7 — to bi ob vrnitvi na občine napačno zaklenilo. */
    if (isGridLocked() && isFreePeriodSelectValue(String(selectValue))) {
      clearPeriodLockUi();
      if (sel) sel.value = selectValue;
      clearCustomRange();
      periodMode = "range";
      mapDay = null;
      days = parseInt(String(selectValue), 10) || 1;
      lastAllowedSelectValue = String(selectValue);
      if (dayPickWrap) dayPickWrap.classList.add("hidden");
      if (typeof closePeriodRangePicker === "function") closePeriodRangePicker();
      showGridLockUi();
      if (typeof updatePeriodLabel === "function") updatePeriodLabel();
      return;
    }
    periodLockUiValue = selectValue;
    if (sel) sel.value = selectValue;
    if (dayPickWrap) dayPickWrap.classList.add("hidden");
    if (typeof closePeriodRangePicker === "function") closePeriodRangePicker();
    applyFeatureLockCopy(isGridLocked() ? LOCK_COPY_GRID : LOCK_COPY_PERIOD);
    showFeatureLockOverlay();
    setMapViewTabActive(mapView);
    syncSupporterLockMarks();
  }

  function clearPeriodLockUi() {
    periodLockUiValue = null;
  }

  function showGridLockUi() {
    mapView = "grid";
    mapMode = "gostota";
    applyFeatureLockCopy(LOCK_COPY_GRID);
    showFeatureLockOverlay();
    setMapViewTabActive("grid");
    if (typeof syncMapModeForPeriod === "function") syncMapModeForPeriod();
    syncSupporterLockMarks();
    try {
      window.parent.postMessage(
        { type: "strele-map-view-changed", view: "grid", locked: true },
        "*"
      );
    } catch (_) {}
  }

  function switchToObcineFromLockedGrid() {
    clearAllGridState();
    mapView = "obcine";
    mapMode = lastObcineMode || "stevilo";
    try { restoreObcineMinZoom(); } catch (_) {}
    setMapViewTabActive("obcine");
    if (typeof syncMapModeForPeriod === "function") syncMapModeForPeriod();

    /* Izpelji dostop znova za občine — ne uporabi sticky zaklepa iz mreže. */
    const uiPeriod = currentUiPeriodValue();
    clearPeriodLockUi();

    if (!isPeriodLocked("obcine", uiPeriod, hasSupporterAccess)) {
      clearCustomRange();
      periodMode = "range";
      mapDay = null;
      days = parseInt(uiPeriod, 10) || 1;
      lastAllowedSelectValue = String(days);
      if (sel) sel.value = String(days);
      if (dayPickWrap) dayPickWrap.classList.add("hidden");
      if (typeof closePeriodRangePicker === "function") closePeriodRangePicker();
      hideFeatureLockOverlay();
      syncSupporterLockMarks();
      if (typeof updatePeriodLabel === "function") updatePeriodLabel();
      try {
        window.parent.postMessage(
          { type: "strele-map-view-changed", view: "obcine", period: String(days), locked: false },
          "*"
        );
      } catch (_) {}
      return true;
    }

    periodLockUiValue = uiPeriod;
    if (sel) sel.value = uiPeriod;
    if (dayPickWrap) dayPickWrap.classList.add("hidden");
    if (typeof closePeriodRangePicker === "function") closePeriodRangePicker();
    applyFeatureLockCopy(LOCK_COPY_PERIOD);
    showFeatureLockOverlay();
    syncSupporterLockMarks();
    try {
      window.parent.postMessage(
        { type: "strele-map-view-changed", view: "obcine", period: uiPeriod, locked: true },
        "*"
      );
    } catch (_) {}
    return false;
  }

  function clearAllGridState() {
    unbindGridMapInteraction();
    removeGridLayers();
    closeAllGridTooltips();
    selectedGridLat = null;
    selectedGridLon = null;
    gridCellDailyCache = null;
    gridData = null;
    gridLoadSeq += 1; /* zavrni morebitni zapozneli odgovor mreže */
  }

  function resetGridToObcineView() {
    clearAllGridState();
    mapView = "obcine";
    mapMode = lastObcineMode || "stevilo";
    try { restoreObcineMinZoom(); } catch (_) {}
    setMapViewTabActive("obcine");
    if (typeof syncMapModeForPeriod === "function") syncMapModeForPeriod();
  }

  function syncSupporterLockMarks() {
    const PERIOD_LABELS = {
      "1": "Danes",
      "7": "7 dni",
      "14": "14 dni",
      "30": "30 dni",
      "90": "90 dni",
      custom: "Po meri",
    };
    if (sel) {
      Array.from(sel.options).forEach((opt) => {
        const base = PERIOD_LABELS[opt.value] || String(opt.textContent || "").replace(/^🔒\s*/, "");
        opt.textContent = isPeriodSelectValueLocked(opt.value) ? `🔒 ${base}` : base;
      });
    }
    if (mapViewGridBtn) {
      if (!hasSupporterAccess) {
        mapViewGridBtn.classList.add("map-mode-btn--locked");
        mapViewGridBtn.setAttribute("aria-disabled", "true");
        mapViewGridBtn.title = "Na voljo s paketom Podpornik";
      } else {
        mapViewGridBtn.classList.remove("map-mode-btn--locked");
        mapViewGridBtn.removeAttribute("aria-disabled");
        mapViewGridBtn.title = "";
      }
    }
  }

  function setMapViewTabActive(view) {
    document.querySelectorAll("#mapViewTabs .map-mode-btn").forEach((b) => {
      b.classList.toggle("map-mode-btn--active", b.dataset.view === view);
    });
  }

  function showFeatureLockOverlay() {
    if (!mapFeatureLock) return;
    mapFeatureLock.classList.add("is-active");
    mapFeatureLock.setAttribute("aria-hidden", "false");
  }

  function hideFeatureLockOverlay() {
    if (!mapFeatureLock) return;
    mapFeatureLock.classList.remove("is-active");
    mapFeatureLock.setAttribute("aria-hidden", "true");
    setMapViewTabActive(mapView);
  }

  function resetToAllowedPeriod() {
    clearCustomRange();
    periodMode = "range";
    mapDay = null;
    days = 1;
    lastAllowedSelectValue = "1";
    clearPeriodLockUi();
    if (sel) sel.value = "1";
    if (dayPickWrap) dayPickWrap.classList.add("hidden");
    if (typeof closePeriodRangePicker === "function") closePeriodRangePicker();
    if (!isGridLocked()) hideFeatureLockOverlay();
    syncSupporterLockMarks();
    if (typeof syncMapModeForPeriod === "function") syncMapModeForPeriod();
    if (typeof updatePeriodLabel === "function") updatePeriodLabel();
  }

  /** Če ni Podpornika in je aktivno zaklenjeno obdobje → Danes (Mreža se ločeno resetira). */
  function enforceSupporterAccessOrReset(opts) {
    const reloadAfter = !opts || opts.reload !== false;
    const revokeGrid = opts && opts.revokeGrid;
    if (hasSupporterAccess) {
      clearPeriodLockUi();
      hideFeatureLockOverlay();
      syncSupporterLockMarks();
      return false;
    }
    let didReset = false;
    if (isGridView() || revokeGrid) {
      /* Po izgubi dostopa: prikaži zaklep mreže (mapView=grid, brez podatkov). */
      clearAllGridState();
      showGridLockUi();
      didReset = true;
    }
    if (!isGridLocked() && (isUnderlyingPeriodLocked() || periodLockUiValue)) {
      resetToAllowedPeriod();
      didReset = true;
    } else {
      syncSupporterLockMarks();
    }
    if (didReset && reloadAfter && !isGridLocked()) {
      obcinaData = {};
      reload().then(afterPeriodReload);
    }
    return didReset;
  }

  syncSupporterLockMarks();

  function syncSelectFromPeriod() {
    if (periodLockUiValue && isPeriodSelectValueLocked(periodLockUiValue)) {
      sel.value = periodLockUiValue;
      dayPickWrap.classList.add("hidden");
      return;
    }
    if (customRange) {
      if (isUnderlyingPeriodLocked()) {
        sel.value = lastAllowedSelectValue || "1";
        dayPickWrap.classList.add("hidden");
        return;
      }
      sel.value = "custom";
      dayPickWrap.classList.add("hidden");
      return;
    }
    if (periodMode === "day" && mapDay) {
      if (isUnderlyingPeriodLocked()) {
        sel.value = lastAllowedSelectValue || "1";
        dayPickWrap.classList.add("hidden");
        return;
      }
      sel.value = "custom";
      dayPick.value = mapDay;
      dayPickWrap.classList.add("hidden");
    } else if (days === 1) {
      sel.value = "1";
      dayPickWrap.classList.add("hidden");
    } else {
      sel.value = String(days);
      dayPickWrap.classList.add("hidden");
    }
  }

  async function resolveDefaultPeriod() {
    try {
      const res = await fetchWithTimeout(apiUrl("/api/obcine-map?days=1"));
      if (!res.ok) return;
      const data = await res.json();
      const todayTotal = data.reduce((s, r) => s + (r.stevilo || 0), 0);
      days = todayTotal > 0 ? 1 : DEFAULT_RANGE_DAYS;
      periodMode = "range";
      mapDay = null;
      clearCustomRange();
    } catch (_) {
      /* ob napaki: rezervno obdobje (7 pri gated, 30 pri supporter) */
      days = DEFAULT_RANGE_DAYS;
      periodMode = "range";
      mapDay = null;
      clearCustomRange();
    }
  }

  function updatePeriodLabel() {
    const el = periodLabelNode || document.getElementById("periodLabel");
    if (!el) return;
    periodLabelNode = el;
    if (periodMode === "day" && mapDay) {
      el.textContent = fmtFull(mapDay);
      return;
    }
    if (!customRange && days === 1) {
      el.textContent = fmtFull(todayIso());
      return;
    }
    const { from, to } = mapDateRange();
    el.textContent = formatSlDateRange(from, to);
  }

  function setStatus(msg, isError = false) {
    statusEl.textContent = msg || "";
    statusEl.className = msg ? (isError ? "error" : "") : "hidden";
  }

  let hoverTooltipLayer = null;
  let mapIsZooming = false;

  const OBCINA_STYLE_HOVER = { weight: 1.25, color: "#05a5ce", fillOpacity: 0.9 };
  const OBCINA_STYLE_SELECTED = { weight: 1.75, color: "#05a5ce", fillOpacity: 0.92 };

  function restoreObcinaLayerStyle(layer) {
    if (!layer || !geojsonLayer) return;
    geojsonLayer.resetStyle(layer);
    const selectedId = selectedObMid != null ? String(selectedObMid) : null;
    const id = String(layer.feature?.properties?.OB_MID);
    if (selectedId && id === selectedId) {
      layer.setStyle(OBCINA_STYLE_SELECTED);
      layer.bringToFront();
    }
  }

  function clearCurrentHoverObcina() {
    if (!hoverTooltipLayer) return;
    const layer = hoverTooltipLayer;
    hoverTooltipLayer = null;
    if (typeof layer.closeTooltip === "function") layer.closeTooltip();
    restoreObcinaLayerStyle(layer);
  }

  function isObcinaPreviewActive() {
    if (!hoverTooltipLayer) return false;
    if (mobView) return mobTouchActive && !mobPinchGesture;
    return true;
  }

  function syncObcinaLayerStyles() {
    if (!geojsonLayer) return;
    const previewActive = isObcinaPreviewActive();
    const selectedId = selectedObMid != null ? String(selectedObMid) : null;
    let selectedLayer = null;

    geojsonLayer.eachLayer(function (layer) {
      geojsonLayer.resetStyle(layer);
      if (previewActive && layer === hoverTooltipLayer) {
        layer.setStyle(OBCINA_STYLE_HOVER);
        layer.bringToFront();
      }
    });

    if (selectedId) {
      geojsonLayer.eachLayer(function (layer) {
        if (String(layer.feature?.properties?.OB_MID) === selectedId) {
          selectedLayer = layer;
        }
      });
      if (selectedLayer) {
        selectedLayer.setStyle(OBCINA_STYLE_SELECTED);
        selectedLayer.bringToFront();
      }
    }
  }

  function closeOtherObcinaTooltips(activeLayer) {
    if (!geojsonLayer) return;
    geojsonLayer.eachLayer(function (other) {
      if (other !== activeLayer && typeof other.closeTooltip === "function") {
        other.closeTooltip();
      }
    });
  }

  function purgeOrphanObcinaTooltips() {
    const pane = map.getPane("tooltipPane");
    if (!pane) return;
    pane.querySelectorAll(".ob-tooltip-shell").forEach((node) => node.remove());
  }

  function closeAllObcinaTooltips() {
    hoverTooltipLayer = null;
    if (geojsonLayer) {
      geojsonLayer.eachLayer(function (layer) {
        if (typeof layer.closeTooltip === "function") layer.closeTooltip();
      });
    }
    purgeOrphanObcinaTooltips();
    syncObcinaLayerStyles();
  }

  map.on("movestart", function () {
    clearCurrentHoverObcina();
    if (isGridView()) clearGridHoverHighlight();
  });
  map.on("zoomstart", function () {
    mapIsZooming = true;
    clearCurrentHoverObcina();
    if (isGridView()) {
      closeAllGridTooltips();
      clearGridHoverHighlight();
    }
  });
  map.on("zoomend", function () {
    mapIsZooming = false;
  });

  if (!mobView) {
    map.getContainer().addEventListener("mouseleave", function () {
      closeAllObcinaTooltips();
      if (isGridView()) {
        closeAllGridTooltips();
        clearGridHoverHighlight();
      }
    });
  }

  if (mobView) {
    map.on("click", function () {
      suppressNextMobileClick = false;
      closeAllObcinaTooltips();
    });
  }

  /* ——— Mobile touch-probe (tooltip preview under finger, no map pan) ——— */
  const MOB_TOUCH_MOVE_PX = 10;

  function pointInRing(lng, lat, ring) {
    let inside = false;
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      const xi = ring[i][0];
      const yi = ring[i][1];
      const xj = ring[j][0];
      const yj = ring[j][1];
      const intersect =
        (yi > lat) !== (yj > lat) &&
        lng < ((xj - xi) * (lat - yi)) / (yj - yi) + xi;
      if (intersect) inside = !inside;
    }
    return inside;
  }

  function polygonRingsContains(lng, lat, rings) {
    if (!rings || !rings.length) return false;
    if (!pointInRing(lng, lat, rings[0])) return false;
    for (let h = 1; h < rings.length; h++) {
      if (pointInRing(lng, lat, rings[h])) return false;
    }
    return true;
  }

  function featureContainsLatLng(feature, latlng) {
    const geom = feature && feature.geometry;
    if (!geom || !latlng) return false;
    const lng = latlng.lng;
    const lat = latlng.lat;
    if (geom.type === "Polygon") {
      return polygonRingsContains(lng, lat, geom.coordinates);
    }
    if (geom.type === "MultiPolygon") {
      const polys = geom.coordinates;
      for (let p = 0; p < polys.length; p++) {
        if (polygonRingsContains(lng, lat, polys[p])) return true;
      }
    }
    return false;
  }

  let mobTouchActive = false;
  let mobPinchGesture = false;
  let mobTouchMoved = false;
  let mobTouchStartX = 0;
  let mobTouchStartY = 0;
  let mobTouchX = 0;
  let mobTouchY = 0;
  let mobHitObMid = null;
  let mobProbeRaf = 0;
  let suppressNextMobileClick = false;

  function obcinaHitAtClientPoint(clientX, clientY) {
    if (!geojsonLayer) return null;
    const rect = map.getContainer().getBoundingClientRect();
    const cp = L.point(clientX - rect.left, clientY - rect.top);
    const latlng = map.containerPointToLatLng(cp);
    let found = null;
    geojsonLayer.eachLayer(function (layer) {
      const feature = layer.feature;
      if (!feature || !layer.getBounds || !layer.getBounds().contains(latlng)) return;
      if (featureContainsLatLng(feature, latlng)) {
        found = {
          layer,
          obMid: feature.properties.OB_MID,
          latlng,
        };
      }
    });
    return found;
  }

  function clearMobObcinaProbeHit() {
    mobHitObMid = null;
    if (hoverTooltipLayer) {
      if (typeof hoverTooltipLayer.closeTooltip === "function") hoverTooltipLayer.closeTooltip();
      hoverTooltipLayer = null;
    }
    syncObcinaLayerStyles();
  }

  function repositionMobObcinaTooltip(layer, latlng) {
    const tooltip = typeof layer.getTooltip === "function" ? layer.getTooltip() : null;
    if (tooltip && typeof layer.isTooltipOpen === "function" && layer.isTooltipOpen()) {
      tooltip.setLatLng(latlng);
    } else if (typeof layer.openTooltip === "function") {
      layer.openTooltip(latlng);
    }
  }

  function applyMobObcinaHit(hit) {
    const obMidStr = String(hit.obMid);
    if (mobHitObMid === obMidStr) {
      repositionMobObcinaTooltip(hit.layer, hit.latlng);
      return;
    }
    mobHitObMid = obMidStr;
    closeOtherObcinaTooltips(hit.layer);
    hoverTooltipLayer = hit.layer;
    syncObcinaLayerStyles();
    repositionMobObcinaTooltip(hit.layer, hit.latlng);
  }

  function enterMobPinchGesture() {
    if (hideMobileMapWheelHint) hideMobileMapWheelHint();
    mobPinchGesture = true;
    mobTouchActive = false;
    cancelMobObcinaProbe();
    clearMobObcinaProbeHit();
  }

  function runMobObcinaProbe() {
    mobProbeRaf = 0;
    if (!mobTouchActive || mobPinchGesture) return;
    const hit = obcinaHitAtClientPoint(mobTouchX, mobTouchY);
    if (!hit) {
      clearMobObcinaProbeHit();
      return;
    }
    applyMobObcinaHit(hit);
  }

  function cancelMobObcinaProbe() {
    if (!mobProbeRaf) return;
    cancelAnimationFrame(mobProbeRaf);
    mobProbeRaf = 0;
  }

  function scheduleMobObcinaProbe() {
    if (!mobTouchActive || mobPinchGesture) return;
    if (mobProbeRaf) return;
    mobProbeRaf = requestAnimationFrame(runMobObcinaProbe);
  }

  function bindMobileObcinaTouchProbe() {
    const container = map.getContainer();

    container.addEventListener(
      "touchstart",
      function (e) {
        if (e.touches.length >= 2) {
          enterMobPinchGesture();
          return;
        }
        if (e.touches.length !== 1 || mobPinchGesture) return;
        suppressNextMobileClick = false;
        mobTouchActive = true;
        mobTouchMoved = false;
        mobTouchStartX = e.touches[0].clientX;
        mobTouchStartY = e.touches[0].clientY;
        mobTouchX = mobTouchStartX;
        mobTouchY = mobTouchStartY;
        scheduleMobObcinaProbe();
      },
      { passive: true }
    );

    container.addEventListener(
      "touchmove",
      function (e) {
        if (e.touches.length >= 2) {
          enterMobPinchGesture();
          return;
        }
        if (mobPinchGesture || !mobTouchActive || e.touches.length !== 1) return;
        mobTouchX = e.touches[0].clientX;
        mobTouchY = e.touches[0].clientY;
        if (!mobTouchMoved) {
          const dist = Math.hypot(mobTouchX - mobTouchStartX, mobTouchY - mobTouchStartY);
          if (dist > MOB_TOUCH_MOVE_PX) mobTouchMoved = true;
        }
        scheduleMobObcinaProbe();
      },
      { passive: true }
    );

    function endMobTouch(e) {
      if (e.touches.length >= 2) {
        enterMobPinchGesture();
        return;
      }
      if (e.touches.length === 1) {
        if (mobPinchGesture) {
          mobTouchActive = false;
          cancelMobObcinaProbe();
        }
        return;
      }
      if (mobTouchMoved) suppressNextMobileClick = true;
      cancelMobObcinaProbe();
      mobTouchActive = false;
      mobPinchGesture = false;
      mobTouchMoved = false;
    }

    container.addEventListener("touchend", endMobTouch, { passive: true });
    container.addEventListener("touchcancel", endMobTouch, { passive: true });
  }

  if (mobView) bindMobileObcinaTouchProbe();

  const DESK_POINTER_MOVE_PX = 5;

  function isMapUiChromeTarget(target) {
    if (!target || typeof target.closest !== "function") return false;
    return !!target.closest(
      "#toolbar, #daysSelect, #mapDayPickWrap, #mapDayPick, #mapModeTabs, .map-mode-btn, #periodLabel, #status, .leaflet-control"
    );
  }

  function bindDesktopObcinaPointerPick() {
    const container = map.getContainer();

    let deskPointerActive = false;
    let deskPointerMoved = false;
    let deskPointerStartX = 0;
    let deskPointerStartY = 0;

    container.addEventListener("pointerdown", function (e) {
      if (e.button !== 0 || !e.isPrimary) return;
      if (isMapUiChromeTarget(e.target)) return;
      deskPointerActive = true;
      deskPointerMoved = false;
      deskPointerStartX = e.clientX;
      deskPointerStartY = e.clientY;
    });

    container.addEventListener("pointermove", function (e) {
      if (!deskPointerActive || deskPointerMoved) return;
      const dist = Math.hypot(e.clientX - deskPointerStartX, e.clientY - deskPointerStartY);
      if (dist > DESK_POINTER_MOVE_PX) deskPointerMoved = true;
    });

    container.addEventListener("pointerup", function (e) {
      if (e.button !== 0) return;
      const wasActive = deskPointerActive;
      deskPointerActive = false;
      if (!wasActive) return;
      if (isMapUiChromeTarget(e.target)) return;
      if (deskPointerMoved || deskMapPanning || mapIsZooming) return;

      const hit = obcinaHitAtClientPoint(e.clientX, e.clientY);
      if (!hit) return;

      const id = String(hit.obMid);
      const pickName = obcinaData[id]?.name || hit.layer.feature?.properties?.OB_UIME || "—";
      closeOtherObcinaTooltips(hit.layer);
      hoverTooltipLayer = hit.layer;
      if (typeof hit.layer.openTooltip === "function") {
        hit.layer.openTooltip(hit.latlng);
      }
      suppressNextDesktopClick = true;
      selectMunicipality(hit.obMid, pickName);
    });

    container.addEventListener("pointercancel", function () {
      deskPointerActive = false;
      deskPointerMoved = false;
    });
  }

  if (!mobView) bindDesktopObcinaPointerPick();

  /* ——— Render choropleth ——— */
  function renderLayer(skipViewport) {
    if (!geojson) return;

    /* izračunaj in nastavi lestvico */
    const scale = resolveScale(mapMode);
    currentBreaks  = scale.breaks;
    currentBandColours = gridBandColoursForBreaks(currentBreaks);
    scaleIsDynamic = scale.isDynamic;
    updateLegend(currentBreaks, scaleIsDynamic, mapMode);

    closeAllObcinaTooltips();
    if (geojsonLayer) map.removeLayer(geojsonLayer);

    geojsonLayer = L.geoJSON(geojson, {
      smoothFactor: _geojsonFullLoaded ? 0 : 1,
      style: function (feature) {
        const id = String(feature.properties.OB_MID);
        const ob = obcinaData[id];
        return {
          fillColor:   colourFor(ob),
          fillOpacity: 0.78,
          color:       "#1a1a1a",
          weight:      0.4,
          opacity:     1,
        };
      },
      onEachFeature: function (feature, layer) {
        const id   = String(feature.properties.OB_MID);
        const name = obcinaData[id]?.name || feature.properties.OB_UIME || "—";

        function tooltipHtml() {
          const cur = obcinaData[id];
          const nameNow = cur?.name || name;
          let html = `<div class="ob-tooltip"><strong>${nameNow}</strong>`;
          if (mapMode === "dni") {
            const dni = cur?.dni_z_nevihto ?? 0;
            html += `<br>Št. dni z nevihto: <strong>${fmt.format(dni)}</strong>`;
          } else {
            const nNow = cur?.stevilo || 0;
            html += `<br>Strele: <strong>${fmt.format(nNow)}</strong>`;
            if (mapMode === "gostota" && cur?.pov_km2 > 0 && nNow > 0) {
              const g = nNow / cur.pov_km2;
              html += `<br>Gostota: <strong>${fmtGostota.format(g)} st. / km²</strong>`;
            }
          }
          html += `</div>`;
          return html;
        }

        layer.bindTooltip(() => tooltipHtml(), { sticky: true, className: "ob-tooltip-shell" });
        layer.on("add", function () {
          const el = typeof layer.getElement === "function" ? layer.getElement() : null;
          if (el) {
            el.setAttribute("tabindex", "-1");
            el.setAttribute("focusable", "false");
          }
        });

        if (!mobView) {
          layer.on("mouseover", function (e) {
            if (mapIsZooming) return;
            closeOtherObcinaTooltips(layer);
            hoverTooltipLayer = layer;
            syncObcinaLayerStyles();
            if (typeof layer.openTooltip === "function") {
              layer.openTooltip(e.latlng);
            }
          });
          layer.on("mouseout", function () {
            if (hoverTooltipLayer === layer) hoverTooltipLayer = null;
            if (typeof layer.closeTooltip === "function") layer.closeTooltip();
            syncObcinaLayerStyles();
          });
        }

        layer.on("click", function (e) {
          const obMid = feature.properties.OB_MID;
          if (mobView) {
            if (suppressNextMobileClick) {
              suppressNextMobileClick = false;
              L.DomEvent.stopPropagation(e);
              return;
            }
            L.DomEvent.stopPropagation(e);
            closeOtherObcinaTooltips(layer);
            hoverTooltipLayer = layer;

            if (typeof layer.openTooltip === "function") {
              layer.openTooltip(e.latlng);
            }
          } else if (suppressNextDesktopClick) {
            suppressNextDesktopClick = false;
            L.DomEvent.stopPropagation(e);
            return;
          }
          selectMunicipality(obMid, name);
        });
      },
    });
    geojsonLayer.addTo(map);
    if (selectedObMid != null) syncObcinaLayerStyles();
    if (!skipViewport) applyMapViewport();
    notifyResize(true);
  }

  /* ——— Data fetching ——— */
  let _geojsonFullLoaded = false;
  let _fullFetch = null;
  let _hadLiteRender = false;

  function onFullGeojsonReady(gj) {
    const needsUpgrade = _hadLiteRender && geojson !== gj;
    geojson = gj;
    _geojsonFullLoaded = true;
    if (needsUpgrade && Object.keys(obcinaData).length) {
      renderLayer(true);
      if (isPublicMapEmbed()) {
        if (!publicUserViewportLocked) schedulePublicMapViewport();
      } else if (mobView && !mobUserViewportLocked) {
        scheduleMobileMapViewport();
      }
    }
  }

  function ensureFullFetch() {
    if (_geojsonFullLoaded || _fullFetch) return _fullFetch;
    _fullFetch = fetchGeojson("/public/data/OB.geojson")
      .then(onFullGeojsonReady)
      .catch((e) => {
        _fullFetch = null;
        console.warn("OB.geojson", e);
        throw e;
      });
    return _fullFetch;
  }

  async function loadGeojson() {
    const fullPath = "/public/data/OB.geojson";
    const litePath = "/public/data/OB-lite.geojson";

    if (!mobView) {
      if (_geojsonFullLoaded) return;
      geojson = await fetchGeojson(fullPath);
      _geojsonFullLoaded = true;
      return;
    }

    if (_geojsonFullLoaded) return;

    ensureFullFetch();

    if (geojson) return;

    try {
      const lite = await fetchGeojson(litePath);
      if (!_geojsonFullLoaded) geojson = lite;
    } catch (_) {
      await ensureFullFetch();
      if (!_geojsonFullLoaded) throw new Error("GeoJSON load failed");
    }
  }

  async function loadObcineData() {
    let fetchUrl;
    if (periodMode === "day" && mapDay) {
      fetchUrl = apiUrl(`/api/obcine-map?day=${encodeURIComponent(mapDay)}`);
    } else {
      const { from, to } = mapDateRange();
      fetchUrl = apiUrl(`/api/obcine-map?from=${from}&to=${to}`);
    }
    const res = await fetchWithTimeout(fetchUrl);
    if (!res.ok) throw new Error(`API HTTP ${res.status}`);
    const data = await res.json();
    obcinaData = {};
    for (const row of data) {
      obcinaData[String(row.ob_id)] = {
        name:          row.obcina,
        stevilo:       row.stevilo,
        pov_km2:       row.pov_km2 || 0,
        dni_z_nevihto: row.dni_z_nevihto || 0,
      };
    }
  }

  /* ——— Grid view (1×1 km) ——— */
  let gridLayer = null;
  let gridBaseLayer = null;
  let gridBaseOutlineLayer = null;
  let gridData = null; /* GeoJSON FeatureCollection */
  let gridLoadSeq = 0; /* zavrni zapoznele odgovore po preklopu na občine */
  let gridHighlightLayer = null;
  let gridHoverPolygon = null;
  let hoverGridCellKey = null;
  let selectedGridLat = null;
  let selectedGridLon = null;
  let hoverGridStrikeLayer = null;
  let gridChartLoadSeq = 0;
  const GRID_CHART_LOAD_ERROR = "Podatkov za izbrano celico ni bilo mogoče naložiti.";
  let gridZeroTipMarker = null;
  let gridMapHoverBound = false;
  let gridMapClickBound = false;
  const GRID_CHART_RADIUS_LABEL = "radij 10 km";
  let gridCellDailyCache = null;
  const GRID_CELL_SIZE_M = 1000;
  const GRID_CELL_STYLE_HOVER = {
    color: "#05a5ce",
    weight: 1.25,
    opacity: 0.95,
    fillColor: "#05a5ce",
    fillOpacity: 0.28,
  };

  proj4.defs(
    "EPSG:3794",
    "+proj=tmerc +lat_0=0 +lon_0=15 +k=0.9999 +x_0=500000 +y_0=-5000000 +ellps=GRS80 +units=m +no_defs"
  );
  const _wgs84ToGrid3794 = proj4("EPSG:4326", "EPSG:3794");
  const _grid3794ToWgs84 = proj4("EPSG:3794", "EPSG:4326");

  function projCoordXY(projected) {
    if (Array.isArray(projected)) return { x: projected[0], y: projected[1] };
    return { x: projected.x, y: projected.y };
  }

  function snapGridOriginMeters(value, cellSize) {
    return Math.floor(value / cellSize) * cellSize;
  }

  function gridCellMetersFromLatLng(latlng) {
    if (!latlng) return null;
    const projected = projCoordXY(_wgs84ToGrid3794.forward([latlng.lng, latlng.lat]));
    return {
      gridX: snapGridOriginMeters(projected.x, GRID_CELL_SIZE_M),
      gridY: snapGridOriginMeters(projected.y, GRID_CELL_SIZE_M),
    };
  }

  function gridCellKeyFromLatLng(latlng) {
    const cell = gridCellMetersFromLatLng(latlng);
    if (!cell) return null;
    return cell.gridX + ":" + cell.gridY;
  }

  function gridCellEnvelopeLatLngs(latlng) {
    const cell = gridCellMetersFromLatLng(latlng);
    if (!cell) return null;
    const gridX = cell.gridX;
    const gridY = cell.gridY;
    const corners = [
      [gridX, gridY],
      [gridX + GRID_CELL_SIZE_M, gridY],
      [gridX + GRID_CELL_SIZE_M, gridY + GRID_CELL_SIZE_M],
      [gridX, gridY + GRID_CELL_SIZE_M],
    ];
    return corners.map(function (xy) {
      const ll = projCoordXY(_grid3794ToWgs84.forward(xy));
      return [ll.y, ll.x];
    });
  }

  function geometryToLatLngs(geometry) {
    if (!geometry || geometry.type !== "Polygon" || !geometry.coordinates || !geometry.coordinates[0]) {
      return null;
    }
    const ring = geometry.coordinates[0];
    if (ring.length < 4) return null;
    const latlngs = ring.slice(0, ring.length - 1).map(function (coord) {
      return [coord[1], coord[0]];
    });
    return latlngs;
  }

  function selectedGridCellKey() {
    if (gridCellDailyCache && gridCellDailyCache.cell && gridCellDailyCache.cell.cell_id) {
      const parts = String(gridCellDailyCache.cell.cell_id).split(":");
      if (parts.length === 3) return parts[1] + ":" + parts[2];
    }
    if (selectedGridLat != null && selectedGridLon != null) {
      return gridCellKeyFromLatLng({ lat: selectedGridLat, lng: selectedGridLon });
    }
    return null;
  }

  function isHoverOnSelectedGridCell(cellKey) {
    const selectedKey = selectedGridCellKey();
    return !!(selectedKey && cellKey && selectedKey === cellKey);
  }

  function clearGridHoverHighlight() {
    hoverGridCellKey = null;
    if (gridHoverPolygon) {
      map.removeLayer(gridHoverPolygon);
    }
  }

  function syncGridHoverHighlight(latlng, feature) {
    if (!isGridView() || mobView || mapIsZooming || !latlng) {
      clearGridHoverHighlight();
      return;
    }
    ensureGridMapPanes();
    const cellKey = feature && feature.properties && feature.properties.cell_id
      ? String(feature.properties.cell_id).split(":").slice(1).join(":")
      : gridCellKeyFromLatLng(latlng);
    if (!cellKey || isHoverOnSelectedGridCell(cellKey)) {
      clearGridHoverHighlight();
      return;
    }
    const latlngs = feature && feature.geometry
      ? geometryToLatLngs(feature.geometry)
      : gridCellEnvelopeLatLngs(latlng);
    if (!latlngs || !latlngs.length) {
      clearGridHoverHighlight();
      return;
    }
    if (hoverGridCellKey === cellKey && gridHoverPolygon && map.hasLayer(gridHoverPolygon)) {
      return;
    }
    hoverGridCellKey = cellKey;
    if (!gridHoverPolygon) {
      gridHoverPolygon = L.polygon(latlngs, {
        pane: "gridHoverPane",
        interactive: false,
        color: GRID_CELL_STYLE_HOVER.color,
        weight: GRID_CELL_STYLE_HOVER.weight,
        opacity: GRID_CELL_STYLE_HOVER.opacity,
        fillColor: GRID_CELL_STYLE_HOVER.fillColor,
        fillOpacity: GRID_CELL_STYLE_HOVER.fillOpacity,
      });
    } else {
      gridHoverPolygon.setLatLngs(latlngs);
      gridHoverPolygon.setStyle(GRID_CELL_STYLE_HOVER);
    }
    if (!map.hasLayer(gridHoverPolygon)) {
      gridHoverPolygon.addTo(map);
    }
  }

  let gridSloveniaMask = null;

  async function loadGridSloveniaMask() {
    if (gridSloveniaMask) return gridSloveniaMask;
    gridSloveniaMask = await fetchGeojson("/public/data/SI.geojson");
    return gridSloveniaMask;
  }

  function removeGridLayers() {
    if (gridLayer) {
      map.removeLayer(gridLayer);
      gridLayer = null;
    }
    if (gridBaseLayer) {
      map.removeLayer(gridBaseLayer);
      gridBaseLayer = null;
    }
    if (gridBaseOutlineLayer) {
      map.removeLayer(gridBaseOutlineLayer);
      gridBaseOutlineLayer = null;
    }
    if (gridHighlightLayer) {
      map.removeLayer(gridHighlightLayer);
      gridHighlightLayer = null;
    }
    clearGridHoverHighlight();
    hoverGridStrikeLayer = null;
    gridData = null;
  }

  function gridCellCenterFromMeters(gridX, gridY) {
    if (!Number.isFinite(gridX) || !Number.isFinite(gridY)) return null;
    if (!_grid3794ToWgs84) return null;
    const ll = projCoordXY(_grid3794ToWgs84.forward([
      gridX + GRID_CELL_SIZE_M / 2,
      gridY + GRID_CELL_SIZE_M / 2,
    ]));
    return { lat: ll.y, lon: ll.x };
  }

  function gridCellCenterFromLatLng(latlng) {
    const cell = gridCellMetersFromLatLng(latlng);
    if (!cell) return null;
    return gridCellCenterFromMeters(cell.gridX, cell.gridY);
  }

  function gridCellCenterFromProps(props) {
    if (!props || props.cell_id == null) return null;
    const parts = String(props.cell_id).split(":");
    if (parts.length < 3) return null;
    const gridX = Number(parts[parts.length - 2]);
    const gridY = Number(parts[parts.length - 1]);
    return gridCellCenterFromMeters(gridX, gridY);
  }

  function formatGridLocationTitle(lat, lon) {
    if (!Number.isFinite(lat) || !Number.isFinite(lon)) return "—";
    const fmtCoord = new Intl.NumberFormat("sl-SI", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    });
    return `${fmtCoord.format(lat)}° N, ${fmtCoord.format(lon)}° E`;
  }

  function formatGridChartTitle(lat, lon) {
    const center = (lat != null && lon != null)
      ? gridCellCenterFromLatLng({ lat: Number(lat), lng: Number(lon) })
      : null;
    const loc = center
      ? formatGridLocationTitle(center.lat, center.lon)
      : "—";
    return `${loc} — ${GRID_CHART_RADIUS_LABEL}`;
  }

  function currentGridChartTitle() {
    if (selectedGridLat != null && selectedGridLon != null) {
      return formatGridChartTitle(selectedGridLat, selectedGridLon);
    }
    return `— — ${GRID_CHART_RADIUS_LABEL}`;
  }

  function gridZeroTooltipHtml(latlng) {
    const center = latlng ? gridCellCenterFromLatLng(latlng) : null;
    const title = center
      ? formatGridLocationTitle(center.lat, center.lon)
      : "—";
    return `<div class="ob-tooltip grid-cell-tooltip"><strong>${title}</strong>` +
      `<br>Gostota strel: <strong>0 st. / km²</strong></div>`;
  }

  function hideGridZeroTooltip() {
    if (!gridZeroTipMarker) return;
    if (typeof gridZeroTipMarker.closeTooltip === "function") gridZeroTipMarker.closeTooltip();
    if (map.hasLayer(gridZeroTipMarker)) map.removeLayer(gridZeroTipMarker);
  }

  function closeGridStrikeTooltips() {
    if (!gridLayer) return;
    gridLayer.eachLayer(function (layer) {
      if (typeof layer.closeTooltip === "function") layer.closeTooltip();
    });
    hoverGridStrikeLayer = null;
  }

  function closeAllGridTooltips() {
    hideGridZeroTooltip();
    closeGridStrikeTooltips();
  }

  function gridStrikeHitAtLatLng(latlng) {
    if (!gridLayer || !latlng) return null;
    let found = null;
    gridLayer.eachLayer(function (layer) {
      if (found) return;
      const feature = layer.feature;
      if (!feature || !featureContainsLatLng(feature, latlng)) return;
      found = { layer, latlng };
    });
    return found;
  }

  function sloveniaHitAtLatLng(latlng) {
    if (!latlng || !gridSloveniaMask || !Array.isArray(gridSloveniaMask.features)) return false;
    const feature = gridSloveniaMask.features[0];
    return !!(feature && featureContainsLatLng(feature, latlng));
  }

  function showGridZeroTooltipAt(latlng) {
    if (!latlng) return;
    if (!gridZeroTipMarker) {
      gridZeroTipMarker = L.circleMarker(latlng, {
        radius: 0,
        interactive: false,
        opacity: 0,
        fillOpacity: 0,
        stroke: false,
      });
      gridZeroTipMarker.bindTooltip(() => gridZeroTooltipHtml(gridZeroTipMarker.getLatLng()), {
        sticky: true,
        className: "ob-tooltip-shell",
      });
    }
    if (!map.hasLayer(gridZeroTipMarker)) gridZeroTipMarker.addTo(map);
    gridZeroTipMarker.setLatLng(latlng);
    if (typeof gridZeroTipMarker.openTooltip === "function") {
      gridZeroTipMarker.openTooltip(latlng);
    }
  }

  function onGridMapMouseMove(e) {
    if (!isGridView() || mobView || mapIsZooming) return;
    const latlng = e.latlng;
    if (!latlng) return;
    const strikeHit = gridStrikeHitAtLatLng(latlng);
    if (strikeHit) {
      hideGridZeroTooltip();
      if (hoverGridStrikeLayer !== strikeHit.layer) {
        closeGridStrikeTooltips();
        hoverGridStrikeLayer = strikeHit.layer;
      }
      if (typeof strikeHit.layer.openTooltip === "function") {
        strikeHit.layer.openTooltip(latlng);
      }
      syncGridHoverHighlight(latlng, strikeHit.layer.feature);
      return;
    }
    closeGridStrikeTooltips();
    if (!sloveniaHitAtLatLng(latlng)) {
      hideGridZeroTooltip();
      clearGridHoverHighlight();
      return;
    }
    showGridZeroTooltipAt(latlng);
    syncGridHoverHighlight(latlng, null);
  }

  function bindGridMapHover() {
    if (gridMapHoverBound) return;
    map.on("mousemove", onGridMapMouseMove);
    gridMapHoverBound = true;
  }

  function bindGridMapInteraction() {
    bindGridMapHover();
    bindGridMapClick();
  }

  function unbindGridMapHover() {
    if (!gridMapHoverBound) return;
    map.off("mousemove", onGridMapMouseMove);
    gridMapHoverBound = false;
    closeAllGridTooltips();
    clearGridHoverHighlight();
  }

  function unbindGridMapInteraction() {
    unbindGridMapHover();
    unbindGridMapClick();
  }

  function onGridMapClick(e) {
    if (!isGridView()) return;
    const ll = e && e.latlng;
    if (!ll || !sloveniaHitAtLatLng(ll)) return;
    /* Če je pod klikom barvna celica mreže, uporabi njeno središče (cell_id).
       Sicer floor-celico okoli klika — enako kot strežnik. */
    const strikeHit = gridStrikeHitAtLatLng(ll);
    if (strikeHit && strikeHit.layer && strikeHit.layer.feature) {
      const fromProps = gridCellCenterFromProps(strikeHit.layer.feature.properties);
      if (fromProps && Number.isFinite(fromProps.lat) && Number.isFinite(fromProps.lon)) {
        selectGridCell(fromProps.lat, fromProps.lon);
        return;
      }
    }
    const fromFloor = gridCellCenterFromLatLng(ll);
    if (fromFloor && Number.isFinite(fromFloor.lat) && Number.isFinite(fromFloor.lon)) {
      selectGridCell(fromFloor.lat, fromFloor.lon);
      return;
    }
    selectGridCell(ll.lat, ll.lng);
  }

  function bindGridMapClick() {
    if (gridMapClickBound) return;
    map.on("click", onGridMapClick);
    gridMapClickBound = true;
  }

  function unbindGridMapClick() {
    if (!gridMapClickBound) return;
    map.off("click", onGridMapClick);
    gridMapClickBound = false;
  }

  async function ensureGridBaseLayer() {
    if (gridBaseLayer) return;
    try {
      ensureGridMapPanes();
      const baseGJ = await loadGridSloveniaMask();
      if (!baseGJ || !baseGJ.features || !baseGJ.features.length) {
        throw new Error("SI.geojson ni na voljo");
      }
      gridBaseLayer = L.geoJSON(baseGJ, {
        pane: "gridBasePane",
        renderer: L.canvas(),
        interactive: false,
        style: {
          fillColor: GRID_DENSITY_BASE_COLOUR,
          fillOpacity: 0.78,
          weight: 0,
          opacity: 0,
          color: "transparent",
        },
      }).addTo(map);
      gridBaseOutlineLayer = L.geoJSON(baseGJ, {
        pane: "gridBasePane",
        interactive: false,
        style: {
          fill: false,
          fillOpacity: 0,
          color: "#b8bcc2",
          weight: 1,
          opacity: 0.65,
        },
      }).addTo(map);
    } catch (e) {
      console.warn("gridBaseLayer", e);
    }
  }

  function gridDisplayValue(props) {
    if (!props) return 0;
    return Number(props.strike_count) || 0;
  }

  function gridColourFor(props) {
    const v = gridDisplayValue(props);
    if (v <= 0) return "transparent";
    const breaks = currentGridBreaks;
    const colours = currentGridBandColours;
    for (let i = breaks.length - 1; i >= 1; i--) {
      if (v >= breaks[i]) return colours[i];
    }
    return colours[1];
  }


  function gridTooltipHtml(props) {
    const v = gridDisplayValue(props);
    const center = gridCellCenterFromProps(props);
    const title = center
      ? formatGridLocationTitle(center.lat, center.lon)
      : "—";
    let html = `<div class="ob-tooltip grid-cell-tooltip"><strong>${title}</strong>`;
    html += `<br>Gostota strel: <strong>${fmt.format(v)} st. / km²</strong>`;
    html += `</div>`;
    return html;
  }

  function gridBorderStyle() {
    return { weight: 0, opacity: 0 };
  }

  function renderGridLayer() {
    if (!gridData || !Array.isArray(gridData.features)) return;

    const gridValues = (gridData.features || []).map((f) => {
      const props = f && f.properties ? f.properties : null;
      return props ? (Number(props.strike_count) || 0) : 0;
    });
    const gridDays = gridScaleDaysKey();
    /* 7 dni — ista gostota kot občine (fiksno + morebitni 2×T/4×T presežek). */
    if (GRID_GOSTOTA_BREAKS_BY_DAYS[gridDays]) {
      const gridScale = resolveGridGostotaScale(gridDays, gridValues);
      currentGridBreaks = gridScale.breaks;
      currentGridBandColours = gridBandColoursForBreaks(currentGridBreaks);
      updateLegend(currentGridBreaks, gridScale.isDynamic, "gostota");
    } else {
      currentGridBreaks = buildAdaptiveBreaks(gridValues, {
        maxBands: MAX_POSITIVE_BANDS,
        firstPositive: 1,
        integer: true,
      });
      currentGridBandColours = gridBandColoursForBreaks(currentGridBreaks);
      updateLegend(currentGridBreaks, true, "gostota");
    }

    if (gridLayer) map.removeLayer(gridLayer);
    ensureGridMapPanes();
    const canvas = L.canvas({ padding: 0.5, pane: "gridStrikePane" });
    gridLayer = L.geoJSON(gridData, {
      pane: "gridStrikePane",
      smoothFactor: 0,
      renderer: canvas,
      interactive: false,
      style: function (feature) {
        const props = feature && feature.properties ? feature.properties : null;
        return {
          fillColor: gridColourFor(props),
          fillOpacity: 0.85,
          color: "#000000",
          opacity: 0,
          ...gridBorderStyle(),
        };
      },
      onEachFeature: function (feature, layer) {
        const props = feature && feature.properties ? feature.properties : null;
        layer.bindTooltip(() => gridTooltipHtml(props), { sticky: true, className: "ob-tooltip-shell" });
        layer.on("add", function () {
          const el = typeof layer.getElement === "function" ? layer.getElement() : null;
          if (el) {
            el.setAttribute("tabindex", "-1");
            el.setAttribute("focusable", "false");
          }
        });
      },
    }).addTo(map);

    notifyResize(true);
  }

  async function loadGridData() {
    if (!hasSupporterAccess || mapView !== "grid") {
      throw new Error("Mreža zahteva paket Podpornik");
    }
    const loadSeq = ++gridLoadSeq;
    let fetchUrl;
    const today = todayIso();
    if (customRange) {
      const { from, to } = mapDateRange();
      fetchUrl = apiUrl(`/api/grid-map?from=${from}&to=${to}`);
    } else if (periodMode === "range" && days === 1) {
      fetchUrl = apiUrl("/api/grid-map?today=1");
    } else if (periodMode === "day" && mapDay) {
      fetchUrl = mapDay === today
        ? apiUrl("/api/grid-map?today=1")
        : apiUrl(`/api/grid-map?day=${encodeURIComponent(mapDay)}`);
    } else if ([7, 14, 30, 90].includes(days)) {
      fetchUrl = apiUrl(`/api/grid-map?days=${days}`);
    } else {
      const { from, to } = mapDateRange();
      fetchUrl = apiUrl(`/api/grid-map?from=${from}&to=${to}`);
    }
    const res = await fetchWithTimeout(fetchUrl, 45000, { headers: strelkoAuthHeaders() });
    if (loadSeq !== gridLoadSeq || mapView !== "grid") return;
    if (!res.ok) throw new Error(`API HTTP ${res.status}`);
    const data = await res.json();
    if (loadSeq !== gridLoadSeq || mapView !== "grid") return;
    gridData = data;
  }

  async function reload() {
    if (isGridView() && !hasSupporterAccess) {
      showGridLockUi();
      setStatus(null);
      return;
    }
    if (!hasSupporterAccess && isUnderlyingPeriodLocked()) {
      setStatus(null);
      applyFeatureLockCopy(LOCK_COPY_PERIOD);
      showFeatureLockOverlay();
      return;
    }
    setStatus("Nalagam …");
    try {
      syncMapModeForPeriod();
      updatePeriodLabel();
      if (isGridView()) {
        removeGridLayers();
        closeAllObcinaTooltips();
        closeAllGridTooltips();
        if (geojsonLayer) {
          map.removeLayer(geojsonLayer);
          geojsonLayer = null;
        }
        // Mreža prikazuje samo gostoto strel.
        if (mapMode !== "gostota") {
          mapMode = "gostota";
          syncMapModeForPeriod();
        }
        applyGridMinZoom();
        selectedObMid = null;
        selectedGridLat = null;
        selectedGridLon = null;
        const chart = document.getElementById("chart-section");
        if (chart) chart.style.display = "";
        resetChartForGridViewSwitch();
        await ensureGridBaseLayer();
        await loadGridData();
        setStatus(null);
        renderGridLayer();
        bindGridMapInteraction();
      } else {
        unbindGridMapInteraction();
        removeGridLayers();
        closeAllGridTooltips();
        selectedGridLat = null;
        selectedGridLon = null;
        restoreObcineMinZoom();
        const chart = document.getElementById("chart-section");
        if (chart) chart.style.display = "";
        gridCellDailyCache = null;
        const hint = document.getElementById("chart-hint");
        if (hint) {
          hint.textContent = "Kliknite na občino za prikaz grafa";
        }
        await Promise.all([loadGeojson(), loadObcineData()]);
        setStatus(null);
        if (mobView && geojson && !_geojsonFullLoaded) _hadLiteRender = true;
        renderLayer();
      }
      notifyResize(true);
    } catch (e) {
      setStatus("Napaka pri nalaganju podatkov.", true);
      console.error(e);
    }
  }

  function afterPeriodReload() {
    if (isGridView()) {
      if (selectedGridLat != null && selectedGridLon != null) {
        selectGridCell(selectedGridLat, selectedGridLon);
      }
      return;
    }
    if (selectedObMid) {
      const ob = obcinaData[String(selectedObMid)];
      if (ob) selectMunicipality(selectedObMid, ob.name);
    } else if (!mobView) {
      preselectBestObcina();
    }
  }

  function applyPeriodSelection() {
    const value = sel.value;
    if (isPeriodSelectValueLocked(value)) {
      showPeriodLockUi(value);
      return;
    }
    clearPeriodLockUi();
    if (value === "custom") {
      openPeriodRangePicker();
      return;
    }
    hideFeatureLockOverlay();
    clearCustomRange();
    periodMode = "range";
    dayPickWrap.classList.add("hidden");
    mapDay = null;
    days = parseInt(value, 10) || 30;
    lastAllowedSelectValue = value;
    closePeriodRangePicker();
    obcinaData = {};
    reload().then(afterPeriodReload);
  }

  /* ——— Controls ——— */
  sel.addEventListener("change", applyPeriodSelection);

  dayPick.addEventListener("change", function () {
    if (periodMode !== "day" || !dayPick.value) return;
    clearCustomRange();
    mapDay = dayPick.value;
    obcinaData = {};
    reload().then(afterPeriodReload);
  });

  /* Custom period range picker (klik na datum zgoraj desno) */
  const periodLabelBtn = document.getElementById("periodLabelBtn");
  const periodRangePicker = document.getElementById("periodRangePicker");
  const periodFromInput = document.getElementById("periodFrom");
  const periodToInput = document.getElementById("periodTo");
  const periodRangeError = document.getElementById("periodRangeError");
  const periodRangeCancel = document.getElementById("periodRangeCancel");
  const periodRangeApply = document.getElementById("periodRangeApply");

  function setPeriodRangeError(msg) {
    if (!periodRangeError) return;
    if (!msg) {
      periodRangeError.textContent = "";
      periodRangeError.classList.add("hidden");
      return;
    }
    periodRangeError.textContent = msg;
    periodRangeError.classList.remove("hidden");
  }

  function isPeriodRangePickerOpen() {
    return periodRangePicker && !periodRangePicker.classList.contains("hidden");
  }

  function closePeriodRangePicker() {
    if (!periodRangePicker) return;
    periodRangePicker.classList.add("hidden");
    if (periodLabelBtn) periodLabelBtn.setAttribute("aria-expanded", "false");
    setPeriodRangeError("");
  }

  function formatPeriodDateLabel(iso) {
    const d = parseIsoDate(iso);
    if (!d) return iso || "—";
    return d.toLocaleDateString("sl-SI", {
      day: "numeric",
      month: "long",
      year: "numeric",
    }).toLocaleLowerCase("sl-SI");
  }

  function syncPeriodDateLabels() {
    const fromLabel = document.getElementById("periodFromLabel");
    const toLabel = document.getElementById("periodToLabel");
    if (fromLabel && periodFromInput) fromLabel.textContent = formatPeriodDateLabel(periodFromInput.value);
    if (toLabel && periodToInput) toLabel.textContent = formatPeriodDateLabel(periodToInput.value);
  }

  function openNativePeriodDatePicker(input, event) {
    if (!input || input.disabled) return;
    if (typeof input.showPicker !== "function") return;
    if (event && event.preventDefault) event.preventDefault();
    input.focus({ preventScroll: true });
    try { input.showPicker(); } catch (_) {}
  }

  function openPeriodRangePicker() {
    if (!hasSupporterAccess) {
      showPeriodLockUi("custom");
      return;
    }
    if (!periodRangePicker || !periodFromInput || !periodToInput) return;
    const today = todayIso();
    const current = mapDateRange();
    periodFromInput.min = CUSTOM_RANGE_MIN_ISO;
    periodToInput.min = CUSTOM_RANGE_MIN_ISO;
    periodFromInput.max = today;
    periodToInput.max = today;
    periodFromInput.value = current.from;
    periodToInput.value = current.to;
    syncPeriodDateLabels();
    /* Če je stanje/URL podal datum pred dovoljenim, pokaži napako (ne sprejmi tiho). */
    setPeriodRangeError(validatePeriodRange(current.from, current.to));
    periodRangePicker.classList.remove("hidden");
    if (periodLabelBtn) periodLabelBtn.setAttribute("aria-expanded", "true");
  }

  function validatePeriodRange(fromIso, toIso) {
    const today = todayIso();
    if (!fromIso || !toIso || !parseIsoDate(fromIso) || !parseIsoDate(toIso)) {
      return "Izberi veljavna datuma Od in Do.";
    }
    if (fromIso < CUSTOM_RANGE_MIN_ISO) {
      return "Datum Od ne sme biti pred 11. 3. 2026.";
    }
    if (toIso < CUSTOM_RANGE_MIN_ISO) {
      return "Datum Do ne sme biti pred 11. 3. 2026.";
    }
    if (toIso > today) return "Datum Do ne sme biti v prihodnosti.";
    if (fromIso > today) return "Datum Od ne sme biti v prihodnosti.";
    if (fromIso > toIso) return "Datum Od ne sme biti za datumom Do.";
    const n = inclusiveDayCount(fromIso, toIso);
    if (n < 1) return "Obdobje mora obsegati najmanj 1 dan.";
    if (n > 90) return "Obdobje sme obsegati največ 90 dni.";
    return "";
  }

  function applyCustomPeriodRange() {
    if (!hasSupporterAccess) {
      showPeriodLockUi("custom");
      return;
    }
    const fromIso = periodFromInput.value;
    const toIso = periodToInput.value;
    const err = validatePeriodRange(fromIso, toIso);
    if (err) {
      setPeriodRangeError(err);
      return;
    }
    setCustomRange(fromIso, toIso);
    lastAllowedSelectValue = "custom";
    dayPickWrap.classList.add("hidden");
    syncSelectFromPeriod();
    closePeriodRangePicker();
    hideFeatureLockOverlay();
    obcinaData = {};
    reload().then(afterPeriodReload);
  }

  if (periodLabelBtn) {
    periodLabelBtn.addEventListener("click", function (e) {
      e.preventDefault();
      e.stopPropagation();
      if (isPeriodRangePickerOpen()) closePeriodRangePicker();
      else openPeriodRangePicker();
    });
  }
  if (periodRangeCancel) {
    periodRangeCancel.addEventListener("click", function (e) {
      e.preventDefault();
      closePeriodRangePicker();
      if (!customRange) syncSelectFromPeriod();
    });
  }
  if (periodRangeApply) {
    periodRangeApply.addEventListener("click", function (e) {
      e.preventDefault();
      applyCustomPeriodRange();
    });
  }
  if (periodFromInput) {
    periodFromInput.addEventListener("click", function (e) {
      openNativePeriodDatePicker(periodFromInput, e);
    });
    periodFromInput.addEventListener("change", function () {
      syncPeriodDateLabels();
      setPeriodRangeError("");
    });
    periodFromInput.addEventListener("input", function () {
      syncPeriodDateLabels();
    });
  }
  if (periodToInput) {
    periodToInput.addEventListener("click", function (e) {
      openNativePeriodDatePicker(periodToInput, e);
    });
    periodToInput.addEventListener("change", function () {
      syncPeriodDateLabels();
      setPeriodRangeError("");
    });
    periodToInput.addEventListener("input", function () {
      syncPeriodDateLabels();
    });
  }
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && isPeriodRangePickerOpen()) {
      closePeriodRangePicker();
      if (!customRange) syncSelectFromPeriod();
    }
  });
  document.addEventListener("mousedown", function (e) {
    if (!isPeriodRangePickerOpen()) return;
    const wrap = periodLabelBtn && periodLabelBtn.closest(".period-label-wrap");
    if (wrap && wrap.contains(e.target)) return;
    closePeriodRangePicker();
    if (!customRange) syncSelectFromPeriod();
  });



  document.getElementById("mapModeTabs").addEventListener("click", function (e) {
    const btn = e.target.closest("[data-mode]");
    if (!btn) return;
    const newMode = btn.dataset.mode;
    if (newMode === "dni" && !allowsDniMode()) return;
    if (newMode === mapMode) return;
    if (!isGridView()) lastObcineMode = newMode;
    mapMode = newMode;
    document.querySelectorAll("#mapModeTabs .map-mode-btn").forEach(b =>
      b.classList.toggle("map-mode-btn--active", b.dataset.mode === mapMode)
    );
    renderLayer();
  });

  document.getElementById("mapViewTabs").addEventListener("click", function (e) {
    const btn = e.target.closest("[data-view]");
    if (!btn) return;
    const next = btn.dataset.view;
    if (!next) return;

    /* Brez Podpornika: mreža → samo zaklenjeni panel (mapView=grid), brez API. */
    if (next === "grid" && (HIDE_GRID_TAB || !hasSupporterAccess)) {
      if (HIDE_GRID_TAB) return;
      showGridLockUi();
      return;
    }

    /* Iz zaklenjene mreže nazaj na Občine — vedno dovoljeno. */
    if (next === "obcine" && isGridLocked()) {
      const shouldReload = switchToObcineFromLockedGrid();
      if (shouldReload) {
        obcinaData = {};
        reload().then(afterPeriodReload);
      }
      return;
    }

    if (next === mapView) {
      if (periodLockUiValue) {
        applyFeatureLockCopy(isGridLocked() ? LOCK_COPY_GRID : LOCK_COPY_PERIOD);
        showFeatureLockOverlay();
        setMapViewTabActive(mapView);
      } else if (isGridLocked()) {
        showGridLockUi();
      }
      return;
    }

    if (next === "grid") {
      mapMode = "gostota";
      applyGridMinZoom();
    } else {
      mapMode = lastObcineMode || "stevilo";
      restoreObcineMinZoom();
    }

    mapView = next;
    setMapViewTabActive(mapView);
    syncMapModeForPeriod();
    syncSupporterLockMarks();

    /* Zaklenjeno obdobje (UI): ohrani obdobje + overlay, ne nalagaj. */
    if (periodLockUiValue || isUnderlyingPeriodLocked()) {
      if (periodLockUiValue) sel.value = periodLockUiValue;
      applyFeatureLockCopy(isGridLocked() ? LOCK_COPY_GRID : LOCK_COPY_PERIOD);
      showFeatureLockOverlay();
      return;
    }

    hideFeatureLockOverlay();
    obcinaData = {};
    reload().then(afterPeriodReload);
  });

  window.addEventListener("message", function (e) {
    if (e.data?.type === "strele-map-set-access") {
      /* Javni embed (grid=0): ne sprejemaj odklepa Podpornik / mreže prek postMessage. */
      if (HIDE_GRID_TAB) {
        hasSupporterAccess = false;
        mapView = "obcine";
        syncSupporterLockMarks();
        return;
      }
      const next = e.data.supporter === true || e.data.supporter === 1 || e.data.supporter === "1";
      const prev = hasSupporterAccess;
      hasSupporterAccess = !!next;
      syncSupporterLockMarks();
      if (prev && !hasSupporterAccess) {
        const wasGrid = isGridView();
        enforceSupporterAccessOrReset({ reload: true, revokeGrid: wasGrid });
      } else if (hasSupporterAccess) {
        clearPeriodLockUi();
        hideFeatureLockOverlay();
        syncSupporterLockMarks();
      }
      return;
    }
    if (e.data?.type === "strele-map-set-days") {
      if (isGridLocked()) {
        showGridLockUi();
        if (sel) sel.value = String(e.data.days || sel.value);
        syncSupporterLockMarks();
        return;
      }
      if (e.data.custom && !hasSupporterAccess) {
        showPeriodLockUi("custom");
        return;
      }
      const d = parseInt(e.data.days, 10);
      if (!d) return;
      if (!hasSupporterAccess && !isFreePeriodSelectValue(String(d))) {
        showPeriodLockUi(String(d));
        return;
      }
      if (d !== days || periodMode !== "range" || customRange) {
        clearPeriodLockUi();
        clearCustomRange();
        periodMode = "range";
        mapDay = null;
        days = d;
        sel.value = d === 1 ? "1" : String(days);
        lastAllowedSelectValue = sel.value;
        dayPickWrap.classList.add("hidden");
        closePeriodRangePicker();
        hideFeatureLockOverlay();
        obcinaData = {};
        reload();
      }
    }
    if (e.data?.type === "strele-map-set-day") {
      if (isGridLocked()) {
        showGridLockUi();
        return;
      }
      if (!hasSupporterAccess) {
        showPeriodLockUi("custom");
        return;
      }
      const iso = e.data.day;
      if (iso && parseIsoDate(iso) && (iso !== mapDay || customRange)) {
        clearPeriodLockUi();
        clearCustomRange();
        periodMode = "day";
        mapDay = iso;
        sel.value = "custom";
        lastAllowedSelectValue = "custom";
        dayPick.value = mapDay;
        dayPickWrap.classList.add("hidden");
        closePeriodRangePicker();
        obcinaData = {};
        reload();
      }
    }
    if (e.data?.type === "strele-map-set-view") {
      const next = e.data.view;
      if (next === "obcine" || next === "grid") {
        if (next === "grid" && !hasSupporterAccess) {
          showGridLockUi();
          return;
        }
        if (next === "obcine" && isGridLocked()) {
          const shouldReload = switchToObcineFromLockedGrid();
          if (shouldReload) {
            obcinaData = {};
            reload().then(afterPeriodReload);
          }
          return;
        }
        if (next === mapView) {
          if (periodLockUiValue) {
            applyFeatureLockCopy(isGridLocked() ? LOCK_COPY_GRID : LOCK_COPY_PERIOD);
            showFeatureLockOverlay();
          }
          return;
        }
        if (next === "grid") {
          mapMode = "gostota";
          applyGridMinZoom();
        } else {
          mapMode = lastObcineMode || "stevilo";
          restoreObcineMinZoom();
        }
        mapView = next;
        setMapViewTabActive(mapView);
        syncMapModeForPeriod();
        syncSupporterLockMarks();
        if (periodLockUiValue || isUnderlyingPeriodLocked()) {
          if (periodLockUiValue) sel.value = periodLockUiValue;
          applyFeatureLockCopy(isGridLocked() ? LOCK_COPY_GRID : LOCK_COPY_PERIOD);
          showFeatureLockOverlay();
          return;
        }
        hideFeatureLockOverlay();
        obcinaData = {};
        reload().then(afterPeriodReload);
      }
    }
  });

  /* ——— Chart.js – dnevni graf za občino ——— */
  Chart.defaults.color = "#999999";
  Chart.defaults.borderColor = "#4d4d4d";
  Chart.defaults.font.family = "'Nunito Sans', system-ui, sans-serif";
  Chart.defaults.font.size = (mobView || window.innerWidth < 640) ? 10 : 14;

  const fmt2 = new Intl.NumberFormat("sl-SI", { useGrouping: true });

  function formatDatumSlChart(iso) {
    const [, m, d] = iso.split("-").map(Number);
    return `${d}. ${m}.`;
  }

  let dailyChart = null;
  let chartDates  = [];
  let chartMode = "obcina"; /* "obcina" | "grid" */

  function destroyDailyChart() {
    if (dailyChart) {
      dailyChart.destroy();
      dailyChart = null;
    }
  }

  function resizeDailyChart() {
    if (!dailyChart) return;
    requestAnimationFrame(() => {
      dailyChart.resize();
    });
  }

  function initDailyChart(mode) {
    const isMob = mobView || window.innerWidth < 640;
    chartMode = mode;
    dailyChart = new Chart(document.getElementById("obcinaDailyCanvas"), {
      type: "bar",
      data: {
        labels: [],
        datasets: [{
          label: "Strele",
          data: [],
          backgroundColor: "rgba(251, 176, 6, 0.75)",
          borderColor: "#fbb006",
          borderWidth: 1,
          borderRadius: 3,
          maxBarThickness: isMob ? 10 : 36,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        layout: { padding: { top: 4, right: isMob ? 4 : 8, left: isMob ? 2 : 4 } },
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title(items) { return formatDatumSlChart(chartDates[items[0].dataIndex]); },
              label(ctx) { return `Strele: ${fmt2.format(ctx.parsed.y)}`; },
            },
          },
        },
        scales: {
          y: { beginAtZero: true, ticks: { precision: 0, font: { size: isMob ? 9 : 12 } } },
          x: {
            ticks: {
              autoSkip: true,
              maxTicksLimit: isMob ? 6 : 10,
              maxRotation: 0,
              font: { size: isMob ? 8 : 10 },
            },
          },
        },
      },
    });
  }

  const chartObNameEl = document.getElementById("chart-ob-name");
  const chartObMetaEl = document.getElementById("chart-ob-meta");
  const chartHintEl   = document.getElementById("chart-hint");
  const GRID_CHART_IDLE_HINT =
    "Kliknite na celico za prikaz statistike v radiju 10 km.";

  function resetChartForGridViewSwitch() {
    gridCellDailyCache = null;
    chartDates = [];
    destroyDailyChart();
    chartMode = "grid";
    chartObNameEl.textContent = "";
    chartObMetaEl.textContent = "";
    chartHintEl.textContent = GRID_CHART_IDLE_HINT;
    chartHintEl.classList.remove("hidden");
    syncGridHighlight(null);
  }

  function formatGridStrikeTotal(n) {
    const x = Math.abs(Number(n) || 0);
    return `Skupaj: ${fmt2.format(x)} strel`;
  }

  function gridSeriesFromCache() {
    if (!gridCellDailyCache || !Array.isArray(gridCellDailyCache.series)) return null;
    return gridCellDailyCache.series[0] || null;
  }

  function renderGridChartFromCache() {
    const series = gridSeriesFromCache();
    if (!series || !Array.isArray(series.daily) || !series.daily.length) {
      showGridChartError(GRID_CHART_LOAD_ERROR);
      return;
    }
    chartDates = series.daily.map(function (d) { return d.datum; });
    chartObNameEl.textContent = currentGridChartTitle();
    chartObMetaEl.textContent = formatGridStrikeTotal(series.total || 0);
    chartHintEl.classList.add("hidden");
    if (!dailyChart || chartMode !== "grid") {
      destroyDailyChart();
      initDailyChart("grid");
    }
    dailyChart.data.labels = chartDates.map(formatDatumSlChart);
    dailyChart.data.datasets[0].data = series.daily.map(function (d) { return d.stevilo; });
    syncGridHighlight(gridCellDailyCache.cell && gridCellDailyCache.cell.geometry);
    requestAnimationFrame(function () {
      dailyChart.resize();
      dailyChart.update("none");
      notifyResize(true);
    });
  }


  function chartObcinaLabel(name) {
    if (!name || name === "—") return name;
    const trimmed = String(name).trim();
    if (/^občina\b/i.test(trimmed)) return trimmed;
    return `Občina ${trimmed}`;
  }

  let selectedObMid = null;

  function syncGridHighlight(geometry) {
    if (gridHighlightLayer) {
      map.removeLayer(gridHighlightLayer);
      gridHighlightLayer = null;
    }
    if (!geometry || !isGridView()) return;
    ensureGridMapPanes();
    gridHighlightLayer = L.geoJSON(
      { type: "Feature", geometry, properties: {} },
      {
        pane: "gridSelectedPane",
        interactive: false,
        style: {
          fillColor: "transparent",
          fillOpacity: 0,
          color: "#ffffff",
          weight: 2,
          opacity: 0.95,
        },
      }
    ).addTo(map);
  }

  function clearGridChartForLoad() {
    chartObNameEl.textContent = currentGridChartTitle();
    chartObMetaEl.textContent = "";
    chartHintEl.textContent = "Nalagam graf …";
    chartHintEl.classList.remove("hidden");
    if (dailyChart && chartMode === "grid") {
      destroyDailyChart();
    }
    syncGridHighlight(null);
    notifyResize(true);
  }

  function showGridChartError(message) {
    if (dailyChart && chartMode === "grid") {
      destroyDailyChart();
    }
    chartObNameEl.textContent = currentGridChartTitle();
    chartObMetaEl.textContent = "";
    chartHintEl.textContent = message || GRID_CHART_LOAD_ERROR;
    chartHintEl.classList.remove("hidden");
    syncGridHighlight(null);
    notifyResize(true);
  }

  async function loadGridCellChart(lat, lon) {
    if (!hasSupporterAccess) {
      showGridChartError("Graf celice je na voljo s paketom Podpornik");
      return;
    }
    const loadSeq = ++gridChartLoadSeq;
    const { from, to } = mapDateRange();
    clearGridChartForLoad();
    try {
      const q = new URLSearchParams({
        lat: String(lat),
        lon: String(lon),
        from,
        to,
      });
      const res = await fetch(apiUrl(`/api/grid-cell-daily?${q}`), {
        credentials: "same-origin",
        headers: strelkoAuthHeaders(),
        cache: "no-store",
      });
      if (loadSeq !== gridChartLoadSeq) return;
      if (!res.ok) {
        showGridChartError(GRID_CHART_LOAD_ERROR);
        return;
      }
      const data = await res.json();
      const series = Array.isArray(data.series) ? data.series : [];
      if (!series.length || !series[0].daily || !series[0].daily.length) {
        showGridChartError(GRID_CHART_LOAD_ERROR);
        return;
      }

      gridCellDailyCache = data;
      if (loadSeq !== gridChartLoadSeq) return;
      renderGridChartFromCache();
    } catch (e) {
      if (loadSeq !== gridChartLoadSeq) return;
      console.warn("Napaka pri nalaganju grafa celice", e);
      showGridChartError(GRID_CHART_LOAD_ERROR);
    }
  }

  function selectGridCell(lat, lon) {
    if (!isGridView() || lat == null || lon == null) return;
    clearEmbedFocus();
    selectedGridLat = lat;
    selectedGridLon = lon;
    loadGridCellChart(lat, lon);
  }

  async function loadObcinaChart(ob_mid, name) {
    const { from, to } = mapDateRange();
    try {
      const res = await fetch(apiUrl(`/api/obcina-daily?ob_mid=${ob_mid}&from=${from}&to=${to}`));
      if (!res.ok) return;
      const data = await res.json();
      chartDates = data.map(d => d.datum);
      const counts = data.map(d => d.stevilo);
      const total  = counts.reduce((s, v) => s + v, 0);

      gridCellDailyCache = null;
