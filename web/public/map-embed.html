      chartObNameEl.textContent = chartObcinaLabel(name);
      chartObMetaEl.textContent = `Skupaj: ${fmt2.format(total)}`;
      chartHintEl.classList.add("hidden");

      if (!dailyChart || chartMode !== "obcina") {
        destroyDailyChart();
        initDailyChart("obcina");
      }
      dailyChart.data.labels = chartDates.map(formatDatumSlChart);
      dailyChart.data.datasets[0].data = counts;
      requestAnimationFrame(() => {
        dailyChart.resize();
        dailyChart.update("none");
        notifyResize(true);
      });
    } catch (e) {
      console.warn("Napaka pri nalaganju grafa občine", e);
    }
  }

  function selectMunicipality(ob_mid, name) {
    if (!ob_mid) return;
    clearEmbedFocus();
    selectedObMid = ob_mid;
    loadObcinaChart(ob_mid, name);
    syncObcinaLayerStyles();
  }


  async function tryGpsPreselect() {
    if (mobView || !navigator.geolocation) return false;
    return new Promise((resolve) => {
      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const { latitude: lat, longitude: lon } = pos.coords;
          /* grobe meje Slovenije */
          if (lat < 45.4 || lat > 46.9 || lon < 13.3 || lon > 16.6) {
            resolve(false);
            return;
          }
          try {
            const res = await fetch(apiUrl(`/api/obcina-by-coords?lat=${lat}&lon=${lon}`));
            if (res.ok) {
              const { ob_mid, name } = await res.json();
              selectMunicipality(ob_mid, name);
              resolve(true);
            } else {
              resolve(false);
            }
          } catch { resolve(false); }
        },
        () => resolve(false),
        { timeout: 4000, maximumAge: 60000 }
      );
    });
  }

  async function preselectBestObcina() {
    const gpsOk = await tryGpsPreselect();
    if (gpsOk) return;
    /* fallback: občina z največ strelami */
    const entries = Object.entries(obcinaData);
    if (!entries.length) return;
    const [topId, topOb] = entries.reduce((best, cur) =>
      cur[1].stevilo > best[1].stevilo ? cur : best
    );
    if (topOb.stevilo > 0) selectMunicipality(parseInt(topId, 10), topOb.name);
  }

  if (!SHOW_CHROME) {
    document.getElementById("toolbar")?.classList.add("hidden");
  }

  if (HIDE_GRID_TAB) {
    mapView = "obcine";
    const gridBtn = document.getElementById("mapViewGridBtn");
    if (gridBtn) {
      gridBtn.hidden = true;
      gridBtn.setAttribute("aria-hidden", "true");
      gridBtn.style.display = "none";
      gridBtn.remove();
    }
    /* Javni embed: gumb Občine / zavihki prikaza niso potrebni (samo občine). */
    const viewTabs = document.getElementById("mapViewTabs");
    if (viewTabs) viewTabs.remove();
    /* Javni embed: plačljiva obdobja popolnoma ven iz DOM (ne CSS-hide). */
    if (sel) {
      Array.from(sel.options).forEach((opt) => {
        if (!isFreePeriodSelectValue(opt.value)) opt.remove();
      });
    }
    const customOpt = document.getElementById("periodCustomOption");
    if (customOpt) customOpt.remove();
    if (dayPickWrap) {
      dayPickWrap.classList.add("hidden");
      dayPickWrap.remove();
    }
    /* Datum ostane viden; Po meri picker in klik na oznako odstranimo. */
    const periodRangePicker = document.getElementById("periodRangePicker");
    if (periodRangePicker) periodRangePicker.remove();
    const periodBtn = document.getElementById("periodLabelBtn");
    if (periodBtn) {
      const oldLabel = document.getElementById("periodLabel");
      const text = oldLabel ? oldLabel.textContent : "";
      const staticLabel = document.createElement("span");
      staticLabel.id = "periodLabel";
      staticLabel.className = "period-label-static";
      staticLabel.textContent = text;
      periodBtn.replaceWith(staticLabel);
      periodLabelNode = staticLabel;
    }
    if (!isFreePeriodSelectValue(String(days))) {
      days = 7;
      periodMode = "range";
      mapDay = null;
      clearCustomRange();
    }
    if (sel && !isFreePeriodSelectValue(sel.value)) sel.value = "7";
    hasSupporterAccess = false;
    updatePeriodLabel();
  }

  /* ——— Init ——— */
  if (mobView) {
    try {
      const preload = document.createElement("link");
      preload.rel = "preload";
      preload.as = "fetch";
      preload.href = apiUrl("/public/data/OB.geojson");
      preload.crossOrigin = "anonymous";
      document.head.appendChild(preload);
    } catch (_) {}
    ensureFullFetch();
  }

  syncMapModeForPeriod();
  (async function boot() {
    if (!hasSupporterAccess) {
      if (mapView === "grid") {
        mapView = "obcine";
        mapMode = lastObcineMode || "stevilo";
      }
      if (customRange || periodMode === "day") {
        resetToAllowedPeriod();
        periodLockedByUrl = true;
      }
    } else if (mapView === "grid") {
      mapMode = "gostota";
      try { applyGridMinZoom(); } catch (_) {}
    }
    if (!periodLockedByUrl) await resolveDefaultPeriod();
    if (!hasSupporterAccess && isUnderlyingPeriodLocked()) {
      days = isFreePeriodSelectValue(String(DEFAULT_RANGE_DAYS)) ? DEFAULT_RANGE_DAYS : 1;
      periodMode = "range";
      mapDay = null;
      clearCustomRange();
      clearPeriodLockUi();
    }
    if (mapView === "grid" && hasSupporterAccess) {
      mapMode = "gostota";
      try { applyGridMinZoom(); } catch (_) {}
    } else if (mapView === "grid") {
      mapView = "obcine";
      mapMode = lastObcineMode || "stevilo";
    }
    syncSelectFromPeriod();
    lastAllowedSelectValue =
      sel.value && isFreePeriodSelectValue(sel.value) ? sel.value : "1";
    syncMapModeForPeriod();
    syncSupporterLockMarks();
    document.querySelectorAll("#mapViewTabs .map-mode-btn").forEach((b) =>
      b.classList.toggle("map-mode-btn--active", b.dataset.view === mapView)
    );
    document.querySelectorAll("#mapModeTabs .map-mode-btn").forEach((b) =>
      b.classList.toggle("map-mode-btn--active", b.dataset.mode === mapMode)
    );
    await reload();
    if (!mobView) preselectBestObcina();
    try {
      if (sessionStorage.getItem("strelko_show_grid_lock") === "1") {
        sessionStorage.removeItem("strelko_show_grid_lock");
        if (!hasSupporterAccess) showGridLockUi();
      }
    } catch (_) {}
  })();

  /* ——— Auto-refresh (poll vsakih 2 min; mreža/Danes največ 2 min, sicer refresh_sec) ——— */
  let _mapLastTodayCount = null;
  let _mapLastReload = Date.now();
  setInterval(async () => {
    try {
      const todayIso = new Date().toISOString().slice(0, 10);
      const d = await fetch(apiUrl(`/api/obcine-map?days=1`)).then((r) => r.ok ? r.json() : null).catch(() => null);
      const todayTotal = d ? d.reduce((s, r) => s + (r.stevilo || 0), 0) : -1;
      const liveGrid = isGridView() && isViewingLiveDay() && hasSupporterAccess;
      const refreshLimitSec = liveGrid ? Math.min(REFRESH_SEC, 120) : REFRESH_SEC;
      const stale = Date.now() - _mapLastReload >= refreshLimitSec * 1000;
      const changed = isViewingLiveDay()
        && _mapLastTodayCount !== null
        && todayTotal !== -1
        && todayTotal !== _mapLastTodayCount;
      if (changed || stale) {
        obcinaData = {};
        if (isGridView()) gridData = null; /* prisili svež zahtevek mreže */
        await reload();
        _mapLastReload = Date.now();
      }
      if (todayTotal !== -1) _mapLastTodayCount = todayTotal;
    } catch (_) { /* ignore */ }
  }, 2 * 60 * 1000);
})();
</script>
</body>
</html>
