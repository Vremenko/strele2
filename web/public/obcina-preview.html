<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Udari strel v občini — Strelko</title>
  <style>
    [data-theme="dark"] {
      --bg: #333333;
      --bg-soft: rgba(0, 0, 0, 0.25);
      --bg-map: #1a1a1a;
      --text: #f2f2f2;
      --text-muted: #999999;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #fbb006;
      --accent-soft: rgba(5, 165, 206, 0.15);
      --accent-text: #fbb006;
      --cyan: #05a5ce;
      --radius: 16px;
      --shadow: none;
      --font: "Nunito Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
      --map-boundary: #05a5ce;
      --map-boundary-fill: rgba(5, 165, 206, 0.15);
    }
    [data-theme="light"] {
      --bg: #ffffff;
      --bg-soft: rgba(0, 0, 0, 0.04);
      --bg-map: #eef1f4;
      --text: #1f2933;
      --text-muted: #5c6670;
      --border: rgba(0, 0, 0, 0.08);
      --accent: #fbb006;
      --accent-soft: rgba(5, 165, 206, 0.12);
      --accent-text: #fbb006;
      --cyan: #05a5ce;
      --radius: 16px;
      --shadow: none;
      --font: "Nunito Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
      --map-boundary: #05a5ce;
      --map-boundary-fill: rgba(5, 165, 206, 0.15);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.45;
    }
    #root {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      justify-content: center;
    }
    .widget {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: visible;
      width: 100%;
      max-width: 100%;
      padding: 1.25rem 1.5rem;
      text-align: left;
      cursor: pointer;
    }
    .widget--compact { max-width: 450px; }
    .widget--full { max-width: 960px; }

    .widget-head {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0 0 1rem;
      background: transparent;
    }
    .widget-logo {
      flex-shrink: 0;
      display: block;
      height: 40px;
      width: auto;
      object-fit: contain;
    }
    .widget-head-text { flex: 1; min-width: 0; }
    .widget-subtitle {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text-muted);
    }
    .widget-muni {
      margin: 0.25rem 0 0;
      font-size: 1.15rem;
      font-weight: 800;
      line-height: 1.2;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .widget-title {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 800;
      line-height: 1.2;
      color: var(--text);
    }

    .widget-desc {
      margin: 0.35rem 0 0;
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .widget-body { padding: 0 0 0.5rem; }
    .widget-state {
      padding: 0.5rem 0;
      text-align: left;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .widget-state--error { color: #b42318; }
    .widget-state .spinner {
      width: 28px;
      height: 28px;
      margin: 0 0 0.65rem;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .stats-grid {
      display: grid;
      gap: 0.75rem;
    }
    .widget--compact .stats-grid { grid-template-columns: 1fr; }
    .widget--full .stats-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    @media (max-width: 640px) {
      .widget--full .stats-grid { grid-template-columns: 1fr; }
    }

    .stat-card {
      background: var(--bg-soft);
      /* Enaka širina roba v obeh temah (teme ne smejo spreminjati zunanjih mer). */
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 1rem;
      text-align: left;
    }
    [data-theme="light"] .stat-card {
      background: var(--bg-map);
      border-color: var(--border);
    }
    .stat-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      margin: 0 0 0.25rem;
    }
    .stat-value {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent-text);
      line-height: 1.15;
    }
    .stat-value--zero {
      color: var(--text-muted);
      font-weight: 600;
    }

    .widget-map-section { padding: 0 0 1rem; }
    .widget-visual-section { padding: 0 0 0.5rem; }
    .widget-visual-tabs {
      display: flex;
      gap: 0.35rem;
      margin: 0 0 0.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.35rem;
    }
    .widget-visual-tab {
      flex: 1;
      background: transparent;
      border: none;
      border-radius: 8px 8px 0 0;
      color: var(--text-muted);
      font: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 0.45rem 0.65rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .widget-visual-tab:hover:not(.widget-visual-tab--active) {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }
    [data-theme="light"] .widget-visual-tab:hover:not(.widget-visual-tab--active) {
      background: rgba(0, 0, 0, 0.04);
    }
    .widget-visual-tab--active {
      background: rgba(5, 165, 206, 0.16);
      color: var(--cyan);
    }
    .widget-visual-panel[hidden] { display: none !important; }
    .widget-visual-caption {
      margin: 0 0 0.5rem;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-muted);
      line-height: 1.35;
    }
    .widget-map-notice {
      margin: 0 0 0.5rem;
      font-size: 0.82rem;
      line-height: 1.35;
      color: var(--accent);
    }
    .widget--full {
      --widget-visual-height: 220px;
      --widget-visual-tabs-height: 0px;
    }
    .widget-visual-section--chart-only {
      padding-top: 0.35rem;
    }
    .widget-visual-section--chart-only .widget-visual-viewport {
      height: calc(var(--widget-visual-height) + var(--widget-visual-tabs-height));
      max-height: min(calc(480px + var(--widget-visual-tabs-height)), 50vh);
    }
    .widget-visual-viewport {
      position: relative;
      width: 100%;
      box-sizing: border-box;
      height: var(--widget-visual-height, 220px);
      min-height: 180px;
      max-height: min(480px, 50vh);
    }
    .widget-visual-panel {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .widget-map-wrap,
    .widget-chart-wrap {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-map);
      position: relative;
      width: 100%;
      box-sizing: border-box;
      height: 100%;
      min-height: 0;
      cursor: pointer;
    }
    .widget-map-wrap #map {
      width: 100%;
      height: 100%;
      min-height: inherit;
    }
    .widget-chart-wrap {
      padding: 0.65rem 0.5rem 0.45rem;
    }
    .widget-chart-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      touch-action: pan-y;
    }
    .map-placeholder {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-height: 220px;
      padding: 1rem;
      text-align: left;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .leaflet-container { font-family: var(--font); background: var(--bg-map); cursor: pointer; }
    .widget-map-wrap .leaflet-control-zoom,
    .widget-map-wrap .leaflet-control-user-location-wrap,
    .widget-map-wrap .maptiler-ctrl,
    .widget-map-wrap .maptiler-ctrl-group,
    .widget-map-wrap .maptiler-ctrl-top-right,
    .widget-map-wrap .maptiler-ctrl-top-left,
    .widget-map-wrap .maptiler-ctrl-bottom-right,
    .widget-map-wrap .maptiler-ctrl-bottom-left,
    .widget-map-wrap .maplibregl-ctrl,
    .widget-map-wrap .maplibregl-ctrl-top-right,
    .widget-map-wrap .maplibregl-ctrl-top-left,
    .widget-map-wrap .maplibregl-ctrl-bottom-right,
    .widget-map-wrap .maplibregl-ctrl-bottom-left,
    #map .maplibregl-ctrl,
    #map .maptiler-ctrl {
      display: none !important;
    }
    /* Kartografska atribucija mora ostati vidna (MapTiler + OpenStreetMap). */
    .widget-map-wrap .leaflet-control-attribution {
      display: block !important;
      max-width: calc(100% - 6px);
      margin: 0;
      padding: 1px 5px;
      border-radius: 3px 0 0 0;
      background: rgba(0, 0, 0, 0.55) !important;
      color: rgba(255, 255, 255, 0.88) !important;
      font-size: 9px !important;
      line-height: 1.25 !important;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: auto;
    }
    [data-theme="light"] .widget-map-wrap .leaflet-control-attribution {
      background: rgba(255, 255, 255, 0.88) !important;
      color: rgba(31, 41, 51, 0.88) !important;
    }
    .widget-map-wrap .leaflet-control-attribution a {
      color: var(--cyan) !important;
    }
    .leaflet-tooltip.ob-strike-tip-shell {
      background: rgba(26, 26, 26, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: #f2f2f2;
      box-shadow: none;
      padding: 0;
    }
    .leaflet-tooltip.ob-strike-tip-shell::before {
      border-top-color: rgba(26, 26, 26, 0.94);
    }
    .ob-strike-tip {
      padding: 0.45rem 0.6rem;
      font-size: 12px;
      line-height: 1.35;
    }
    .ob-strike-tip strong { color: var(--accent); }

    .widget-actions { padding: 0 0 1rem; }
    .btn-detail {
      display: block;
      width: 100%;
      min-height: 44px;
      padding: 0.65rem 1rem;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #1a1a1a;
      font: inherit;
      font-size: 0.92rem;
      font-weight: 800;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
    }
    .btn-detail:hover { filter: brightness(1.04); }
    .btn-detail:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 2px;
    }

    .widget-foot {
      padding: 0.75rem 0 0;
      border-top: 1px solid var(--border);
      background: transparent;
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.4;
      text-align: left;
    }
    .widget-foot strong { color: var(--text-muted); font-weight: 600; }
    .widget-disclaimer {
      margin: 0.45rem 0 0;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body data-theme="dark">
<div id="root"></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" id="ob-leaflet-css" media="not all" />
<link href="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.css" rel="stylesheet" id="ob-maptiler-css" media="not all" />
<script src="/widget/public/estimated-strike-time.js"></script>
<script src="/widget/public/sl-number-format.js"></script>
<script>
(function () {
  "use strict";

  const HEAVY_LIBS = [
    { src: "https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js", crossOrigin: "" },
    { src: "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js", crossOrigin: "" },
    { src: "https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.umd.min.js" },
    { src: "https://cdn.maptiler.com/leaflet-maptilersdk/v4.1.0/leaflet-maptilersdk.umd.min.js" },
  ];
  let heavyLibsPromise = null;

  function enableHeavyStyles() {
    const a = document.getElementById("ob-leaflet-css");
    const b = document.getElementById("ob-maptiler-css");
    if (a) a.media = "all";
    if (b) b.media = "all";
  }

  function ensureHeavyLibs() {
    if (window.Chart && window.L && L.maptiler) return Promise.resolve();
    if (heavyLibsPromise) return heavyLibsPromise;
    enableHeavyStyles();
    heavyLibsPromise = HEAVY_LIBS.reduce(function (chain, lib) {
      return chain.then(function () {
        if (document.querySelector('script[data-ob-lib="' + lib.src + '"]')) return;
        return new Promise(function (resolve, reject) {
          const s = document.createElement("script");
          s.src = lib.src;
          s.async = false;
          s.dataset.obLib = lib.src;
          if (lib.crossOrigin !== undefined) s.crossOrigin = lib.crossOrigin;
          s.onload = resolve;
          s.onerror = function () { reject(new Error("Lib fail: " + lib.src)); };
          document.head.appendChild(s);
        });
      });
    }, Promise.resolve());
    return heavyLibsPromise;
  }

  const params = new URLSearchParams(location.search);
  const cfg = window.OBCINA_WIDGET_CONFIG || {};
  const IS_PREVIEW = /obcina-preview\.html$/i.test(location.pathname);
  const publicKey = IS_PREVIEW ? "" : String(params.get("id") || cfg.publicKey || "").trim();
  let previewToken = IS_PREVIEW ? String(params.get("token") || "").trim() : "";
  const legacyQueryBlocked = params.has("ob_mid") || params.has("scope") || params.has("theme")
    || params.has("size") || params.has("api");

  let size = "compact";
  let theme = "dark";
  let obMidParam = null;
  let isNationalScope = false;
  let bootError = null;
  if (legacyQueryBlocked) bootError = "Nepodprti parametri.";
  else if (IS_PREVIEW && !previewToken) bootError = "Manjka preview žeton.";
  else if (!IS_PREVIEW && !publicKey) bootError = "Manjka ID widgeta.";

  const PREVIEW_UPDATE_TYPE = "strele-obcina-preview-update";
  const PREVIEW_CACHED_TYPE = "strele-obcina-preview-cached";
  let previewLoadSeq = 0;
  let previewForceLoading = false;
  const previewDataCache = Object.create(null);
  let lastPreviewPayload = null;
  let lastPreviewDataKey = "";
  let preserveDisplayConfig = false;

  function previewCacheKeyFromPayload(payload) {
    if (!payload) return "";
    if (payload.scope === "slovenija") return "slovenija";
    if (payload.ob_mid != null) return "ob:" + Number(payload.ob_mid);
    return "";
  }

  function notifyParentPreviewCached(dataKey) {
    if (!dataKey || window.parent === window) return;
    try {
      window.parent.postMessage(
        { type: PREVIEW_CACHED_TYPE, dataKey: dataKey },
        location.origin
      );
    } catch (_) {
      /* ignore */
    }
  }

  function applyDisplayConfig(nextTheme, nextSize) {
    if (nextTheme === "light" || nextTheme === "dark") applyTheme(nextTheme);
    if (nextSize === "full" || nextSize === "compact") size = nextSize;
  }

  function applyPreviewMessageFromParent(msg) {
    if (!IS_PREVIEW || !msg) return;
    const nextTheme = msg.theme;
    const nextSize = msg.size;
    const token = typeof msg.token === "string" ? String(msg.token).trim() : "";
    const dataKey = typeof msg.dataKey === "string" ? String(msg.dataKey).trim() : "";

    if (token) {
      previewToken = token;
      bootError = legacyQueryBlocked ? "Nepodprti parametri." : null;
      municipalityName = "";
      lat = NaN;
      lon = NaN;
      obMidParam = null;
      isNationalScope = false;
      previewForceLoading = true;
      applyDisplayConfig(nextTheme, nextSize);
      try {
        const url = new URL(location.href);
        url.searchParams.set("token", previewToken);
        history.replaceState(null, "", url.pathname + url.search);
      } catch (_) {
        /* ignore */
      }
      if (dataKey && previewDataCache[dataKey]) {
        lastPreviewPayload = previewDataCache[dataKey];
        lastPreviewDataKey = dataKey;
        loadFromCachedPayload(previewDataCache[dataKey]);
        notifyParentPreviewCached(dataKey);
        return;
      }
      preserveDisplayConfig = true;
      load();
      return;
    }

    if (dataKey && previewDataCache[dataKey]) {
      previewForceLoading = true;
      applyDisplayConfig(nextTheme, nextSize);
      lastPreviewPayload = previewDataCache[dataKey];
      lastPreviewDataKey = dataKey;
      loadFromCachedPayload(previewDataCache[dataKey]);
      notifyParentPreviewCached(dataKey);
      return;
    }

    applyDisplayConfig(nextTheme, nextSize);
    if (lastPreviewPayload) {
      loadFromCachedPayload(lastPreviewPayload);
    }
  }

  if (IS_PREVIEW) {
    window.addEventListener("message", function (ev) {
      if (ev.source !== window.parent) return;
      if (ev.origin !== location.origin) return;
      const data = ev.data;
      if (!data || data.type !== PREVIEW_UPDATE_TYPE) return;
      applyPreviewMessageFromParent(data);
    });
  }

  function applyTheme(nextTheme) {
    const next = nextTheme === "light" ? "light" : "dark";
    const changed = theme !== next;
    theme = next;
    document.documentElement.setAttribute("data-theme", theme);
    document.body.setAttribute("data-theme", theme);
    // Po menjavi teme ponovno izmeri vsebino (brez fiksne višine).
    if (changed) {
      requestAnimationFrame(function () {
        notifyResize();
        requestAnimationFrame(notifyResize);
      });
    }
  }
  applyTheme("dark");

  let lat = parseFloat(cfg.lat);
  let lon = parseFloat(cfg.lon);
  let municipalityName = String(cfg.municipalityName || "").trim();
  const detailUrlParam = String(cfg.detailUrl || "").trim();
  const REFRESH_MS = (parseInt(cfg.refresh || "300", 10) || 300) * 1000;
  const PERIOD_DAYS = 30;

  const WIDGET_API = location.origin + "/widget/api";
  const STRELKO_API = location.origin + "/api/v1";
  const STRELKO_SITE = "https://strelko.meteoinfo.si";

  function formatSlInt(value) {
    const api = window.StrelkoSlNumberFormat;
    if (api && typeof api.formatSlInt === "function") return api.formatSlInt(value);
    const n = Math.round(Number(value));
    if (!Number.isFinite(n)) return "—";
    return String(n);
  }

  const MAPTILER_KEY = "49h4zzj96Wh7pGHWjiId";
  const STYLE_BASE_LIGHT = "019cde7d-3f45-7c4a-974c-c31f0757f24d";
  const STYLE_KRAJI_LIGHT = "019cf131-5fa7-7706-ab76-3b3fa0899d6e";
  const STYLE_BASE_DARK = "019c91be-c9e9-7eac-9e88-83d4e8cf7691";
  const STYLE_KRAJI_DARK = "019cdeec-2c48-7778-9774-ad2176fec7cd";
  const STYLE_BASE = theme === "dark" ? STYLE_BASE_DARK : STYLE_BASE_LIGHT;
  const STYLE_KRAJI = theme === "dark" ? STYLE_KRAJI_DARK : STYLE_KRAJI_LIGHT;
  const MAP_ATTRIBUTION =
    '&copy; <a href="https://www.maptiler.com/copyright/" target="_blank" rel="noopener">MapTiler</a> ' +
    '&copy; <a href="https://www.openstreetmap.org/copyright/" target="_blank" rel="noopener">OpenStreetMap</a>';
  /** Hardcoded string that @maptiler/leaflet-maptilersdk injects on layer add. */
  const MAPTILER_SDK_ATTRIBUTION =
    '<a href="https://www.maptiler.com/copyright/" target="_blank">&copy; MapTiler</a> ' +
    '<a href="https://www.openstreetmap.org/copyright" target="_blank">&copy; OpenStreetMap contributors</a>';

  let map = null;
  let baseLayer = null;
  let strikeLayer = null;
  let strikeCanvasRenderer = null;
  let boundaryLayer = null;
  let labelsLayer = null;
  let obLiteCache = null;
  let mapBounds = null;
  let layoutBounds = null;
  let storedVisualHeightPx = null;
  let storedTabsHeightPx = null;
  let mapResizeObserver = null;
  let widgetResizeObserver = null;
  let mapFrameLock = false;
  let mapResizeTimer = null;
  let widgetResizeTimer = null;
  let windowResizeTimer = null;
  let windowResizeBound = false;
  let dailyChart = null;
  let userVisualPanel = null;
  let lastVisualScopeKey = null;
  let currentView = null;
  let chartResizeObserver = null;

  function activeVisualPanel(view) {
    if (!view) return "chart";
    return userVisualPanel || "chart";
  }

  function isChartOnlyVisual(view) {
    /* Zemljevid v widgetu je odstranjen — ostane samo graf. */
    return !!(view && view.showMap);
  }

  function formatChartDayLabel(dateStr) {
    if (!dateStr) return "";
    const parts = String(dateStr).slice(0, 10).split("-");
    if (parts.length !== 3) return dateStr;
    return `${Number(parts[2])}.${Number(parts[1])}.`;
  }

  function destroyChartResizeObserver() {
    if (chartResizeObserver) {
      chartResizeObserver.disconnect();
      chartResizeObserver = null;
    }
  }

  function observeChartResize() {
    destroyChartResizeObserver();
    const wrap = document.querySelector(".widget-chart-wrap");
    if (!wrap) return;
    chartResizeObserver = new ResizeObserver(function () {
      if (dailyChart) dailyChart.resize();
      notifyResize();
    });
    chartResizeObserver.observe(wrap);
  }

  function isMobileChart() {
    return window.matchMedia("(max-width: 639px)").matches;
  }

  function destroyDailyChart() {
    if (dailyChart) {
      dailyChart.destroy();
      dailyChart = null;
    }
    destroyChartResizeObserver();
  }

  function renderDailyChart(daily, attempt) {
    attempt = attempt || 0;
    const canvas = document.getElementById("daily-chart");
    if (!canvas) return;
    if (typeof Chart === "undefined") {
      if (attempt < 40) setTimeout(function () { renderDailyChart(daily, attempt + 1); }, 100);
      return;
    }

    const wrap = canvas.closest(".widget-chart-wrap");
    if (wrap && (wrap.clientWidth < 2 || wrap.clientHeight < 2)) {
      if (attempt < 80) requestAnimationFrame(function () { renderDailyChart(daily, attempt + 1); });
      return;
    }

    destroyDailyChart();

    const rows = (daily || []).slice(-PERIOD_DAYS);
    const labels = rows.map((row) => formatChartDayLabel(row.datum));
    const values = rows.map((row) => Number(row.stevilo) || 0);
    const accent = getComputedStyle(document.body).getPropertyValue("--accent").trim() || "#fbb006";
    const muted = getComputedStyle(document.body).getPropertyValue("--text-muted").trim() || "#999999";
    const grid = theme === "dark" ? "#4d4d4d" : "rgba(0, 0, 0, 0.08)";

    Chart.defaults.color = muted;
    Chart.defaults.borderColor = grid;
    Chart.defaults.font.family = '"Nunito Sans", system-ui, sans-serif';
    Chart.defaults.font.size = 11;

    const mobileChart = isMobileChart();
    if (wrap) wrap.style.touchAction = "pan-y";
    canvas.style.touchAction = "pan-y";

    dailyChart = new Chart(canvas, {
      type: "bar",
      data: {
        labels,
        datasets: [{
          label: "Udari strel",
          data: values,
          backgroundColor: accent,
          borderColor: accent,
          borderWidth: 0,
          borderRadius: 3,
          maxBarThickness: 14,
        }],
      },
      options: {
        events: mobileChart ? [] : undefined,
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { top: 4, right: 4, left: 0, bottom: 0 } },
        plugins: {
          legend: { display: false },
          tooltip: {
            enabled: !mobileChart,
            callbacks: {
              title(items) {
                const idx = items[0]?.dataIndex;
                const row = rows[idx];
                return row ? formatDateSl(row.datum) : "";
              },
              label(ctx) {
                return `Strele: ${formatSlInt(ctx.parsed.y)}`;
              },
            },
          },
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: {
              color: muted,
              maxRotation: 0,
              autoSkip: true,
              maxTicksLimit: 10,
            },
          },
          y: {
            beginAtZero: true,
            grid: { color: grid },
            ticks: {
              color: muted,
              precision: 0,
              maxTicksLimit: 6,
              callback(value) {
                return formatSlInt(value);
              },
            },
          },
        },
      },
    });
    observeChartResize();
  }

  function panelContainerSelector(panel) {
    return panel === "map" ? ".widget-map-wrap" : ".widget-chart-wrap";
  }

  function whenPanelReady(panel, cb, attempts) {
    attempts = attempts == null ? 80 : attempts;
    const el = document.querySelector(panelContainerSelector(panel));
    if (!el) {
      if (attempts > 0) requestAnimationFrame(function () { whenPanelReady(panel, cb, attempts - 1); });
      else cb();
      return;
    }
    if (el.clientWidth > 0 && el.clientHeight > 0) {
      cb();
      return;
    }
    if (attempts <= 0) {
      cb();
      return;
    }
    requestAnimationFrame(function () { whenPanelReady(panel, cb, attempts - 1); });
  }

  function measureVisualTabsHeight() {
    const tabs = document.querySelector(".widget-visual-tabs:not(.widget-visual-tabs--probe)");
    if (tabs && tabs.offsetHeight > 0) {
      storedTabsHeightPx = tabs.offsetHeight;
      return storedTabsHeightPx;
    }
    if (storedTabsHeightPx) return storedTabsHeightPx;

    const widget = document.querySelector(".widget--full");
    if (!widget) return 0;

    const probe = document.createElement("div");
    probe.className = "widget-visual-tabs widget-visual-tabs--probe";
    probe.setAttribute("aria-hidden", "true");
    probe.style.visibility = "hidden";
    probe.style.position = "absolute";
    probe.style.pointerEvents = "none";
    probe.innerHTML =
      '<button type="button" class="widget-visual-tab widget-visual-tab--active">Zemljevid</button>' +
      '<button type="button" class="widget-visual-tab">Graf</button>';
    widget.appendChild(probe);
    storedTabsHeightPx = probe.offsetHeight;
    widget.removeChild(probe);
    return storedTabsHeightPx;
  }

  function applyVisualLayoutMetrics() {
    const widget = document.querySelector(".widget--full");
    if (!widget) return;
    widget.style.setProperty("--widget-visual-tabs-height", measureVisualTabsHeight() + "px");
  }

  function scheduleVisualPanel(view, panel) {
    currentView = view;
    setVisualPanel(panel, view);
  }

  function visualCaptionForPanel(panel, view) {
    if (panel === "map") return "Strele v zadnjih 24 urah";
    const days = (view && view.periodDays) || PERIOD_DAYS;
    return "Strele v zadnjih " + days + " dneh";
  }

  function updateVisualCaption(panel, view) {
    const el = document.getElementById("widget-visual-caption");
    if (el) el.textContent = visualCaptionForPanel(panel, view);
  }

  function visualContainerWidth() {
    const viewport = document.querySelector(".widget-visual-viewport");
    if (viewport && viewport.clientWidth >= 2) return viewport.clientWidth;
    const wrap = document.querySelector(".widget-map-wrap") || document.querySelector(".widget-chart-wrap");
    if (wrap && wrap.clientWidth >= 2) return wrap.clientWidth;
    const widget = document.querySelector(".widget--full");
    if (widget && widget.clientWidth >= 2) return widget.clientWidth - 48;
    return window.innerWidth || 320;
  }

  function boundsFromGeoJson(geo) {
    try {
      const layer = L.geoJSON(geo);
      const b = layer.getBounds();
      return b && b.isValid() ? b : null;
    } catch (_) {
      return null;
    }
  }

  function boundsFromFeature(feature) {
    return boundsFromGeoJson(feature);
  }

  function visualScopeKey(view) {
    if (!view) return "";
    return view.isNational ? "slovenija" : String(view.obMid || "");
  }

  function initVisualMapPanel(view) {
    if (!view) return;
    if (!view.isNational && !view.obMid) return;
    requestAnimationFrame(function () {
      requestAnimationFrame(async function () {
        try {
          const geo = view.isNational
            ? await fetchSiGeometry()
            : await fetchObcinaGeometry(view.obMid);
          if (!geo) return;
          renderObcinaMap(view.strikes, geo, view.isNational);
          [100, 350, 800].forEach(function (delay) {
            setTimeout(function () {
              if (mapBounds) applyMapFrame(mapBounds);
              fitMunicipalityView();
              notifyResize();
            }, delay);
          });
        } catch (_) {}
      });
    });
  }

  function setVisualPanel(panel, view) {
    const mapPanel = document.getElementById("visual-panel-map");
    const chartPanel = document.getElementById("visual-panel-chart");
    const tabs = document.querySelectorAll("[data-visual-tab]");
    if (!chartPanel) return;

    const chartOnly = isChartOnlyVisual(view);
    if (chartOnly) panel = "chart";

    if (chartOnly) {
      updateVisualCaption(panel, view);
      applyVisualLayoutMetrics();
      syncVisualHeights();
      chartPanel.hidden = false;
      teardownMap();
      whenPanelReady("chart", function () {
        renderDailyChart(view ? view.daily : []);
        if (dailyChart) dailyChart.resize();
        notifyResize();
        requestAnimationFrame(notifyResize);
      });
      return;
    }

    if (!mapPanel) return;

    tabs.forEach(function (tab) {
      const active = tab.dataset.visualTab === panel;
      tab.classList.toggle("widget-visual-tab--active", active);
      tab.setAttribute("aria-selected", active ? "true" : "false");
    });

    updateVisualCaption(panel, view);
    applyVisualLayoutMetrics();
    syncVisualHeights();

    mapPanel.hidden = panel !== "map";
    chartPanel.hidden = panel !== "chart";

    if (panel === "map") {
      destroyDailyChart();
      whenPanelReady("map", function () {
        initVisualMapPanel(view);
        notifyResize();
      });
    } else {
      teardownMap();
      whenPanelReady("chart", function () {
        renderDailyChart(view ? view.daily : []);
        if (dailyChart) dailyChart.resize();
        notifyResize();
      });
    }
  }

  function bindVisualTabs() {
    document.querySelectorAll("[data-visual-tab]").forEach(function (tab) {
      tab.addEventListener("click", function () {
        const panel = tab.dataset.visualTab;
        if (!panel || !currentView || panel === activeVisualPanel(currentView)) return;
        userVisualPanel = panel;
        scheduleVisualPanel(currentView, panel);
      });
    });
  }

  async function ensureLayoutBounds(obMid) {
    if (layoutBounds && layoutBounds.isValid()) return layoutBounds;
    if (!obMid) return null;
    try {
      const feature = await fetchObcinaGeometry(obMid);
      layoutBounds = boundsFromFeature(feature);
    } catch (_) {}
    return layoutBounds;
  }

  async function ensureLayoutBoundsForView(view) {
    if (view && view.isNational) {
      try {
        const geo = await fetchSiGeometry();
        layoutBounds = boundsFromGeoJson(geo);
      } catch (_) {}
      return layoutBounds;
    }
    if (!view || !view.obMid) return null;
    return ensureLayoutBounds(view.obMid);
  }

  function mountVisualPanel(view) {
    currentView = view;
    bindVisualTabs();
    const panel = activeVisualPanel(view);
    const chartOnly = isChartOnlyVisual(view);

    if (chartOnly) {
      teardownMap();
    }

    ensureLayoutBoundsForView(view).then(function (bounds) {
      applyVisualLayoutMetrics();
      if (bounds && bounds.isValid()) applyMapFrame(bounds);
      else syncVisualHeights();
      if (!chartOnly) observeMapResize();
      setVisualPanel(panel, view);
      requestAnimationFrame(notifyResize);
    });
  }

  function isUltraNarrowViewport(containerW) {
    const w = containerW || window.innerWidth || 400;
    return w < 360 || window.matchMedia("(max-width: 360px)").matches;
  }

  function mapVisualHeightLimits(containerW) {
    const w = containerW || window.innerWidth || 400;
    const ultra = isUltraNarrowViewport(w);
    const vhCap = Math.round(window.innerHeight * (ultra ? 0.5 : 0.44));
    const min = ultra ? 200 : 180;
    const maxCap = ultra ? 480 : 440;
    return { min, max: Math.max(min, Math.min(maxCap, vhCap)) };
  }

  function municipalityAspectRatio(bounds) {
    const ne = bounds.getNorthEast();
    const sw = bounds.getSouthWest();
    const latSpan = Math.max(ne.lat - sw.lat, 0.005);
    const lonSpan = Math.max(ne.lon - sw.lon, 0.005);
    const avgLat = (ne.lat + sw.lat) / 2;
    const geoW = lonSpan * Math.cos((avgLat * Math.PI) / 180);
    const geoH = latSpan;
    return Math.max(0.85, Math.min(2.8, geoW / geoH));
  }

  function computeMapFrameHeight(containerWidth, geoRatio) {
    const limits = mapVisualHeightLimits(containerWidth);
    const ideal = Math.round(containerWidth / geoRatio);
    return Math.max(limits.min, Math.min(limits.max, ideal));
  }

  function setVisualPanelHeight(heightPx) {
    storedVisualHeightPx = Math.round(heightPx);
    const widget = document.querySelector(".widget--full");
    if (widget) widget.style.setProperty("--widget-visual-height", storedVisualHeightPx + "px");
    const viewport = document.querySelector(".widget-visual-viewport");
    if (viewport) viewport.style.height = "";
  }

  function resetVisualPanelHeight() {
    storedVisualHeightPx = null;
    const widget = document.querySelector(".widget--full");
    if (widget) widget.style.removeProperty("--widget-visual-height");
    const viewport = document.querySelector(".widget-visual-viewport");
    if (viewport) viewport.style.height = "";
  }

  function visualWrapHeightPx(containerW) {
    const w = containerW || visualContainerWidth();
    const bounds = (layoutBounds && layoutBounds.isValid()) ? layoutBounds : mapBounds;
    if (bounds && bounds.isValid()) {
      return computeMapFrameHeight(w, municipalityAspectRatio(bounds));
    }
    if (storedVisualHeightPx) return storedVisualHeightPx;
    return mapVisualHeightLimits(w).max;
  }

  function syncVisualHeights() {
    setVisualPanelHeight(visualWrapHeightPx());
  }

  function ensureVisualWrapHeight(wrap) {
    if (!wrap) return;
    wrap.style.aspectRatio = "";
    syncVisualHeights();
  }

  function applyMapFrame(bounds) {
    if (mapFrameLock || !bounds || !bounds.isValid()) return;

    mapFrameLock = true;
    try {
      layoutBounds = bounds;
      mapBounds = bounds;
      const containerW = visualContainerWidth();
      if (containerW < 2) return;

      const geoRatio = municipalityAspectRatio(bounds);
      const heightPx = computeMapFrameHeight(containerW, geoRatio);
      setVisualPanelHeight(heightPx);
    } finally {
      mapFrameLock = false;
    }
  }

  function scheduleMapRelayout() {
    const bounds = (layoutBounds && layoutBounds.isValid()) ? layoutBounds : mapBounds;
    if (!bounds || !bounds.isValid()) return;
    clearTimeout(windowResizeTimer);
    windowResizeTimer = setTimeout(function () {
      applyMapFrame(bounds);
      if (map) fitMunicipalityView();
      if (dailyChart) dailyChart.resize();
      notifyResize();
    }, 80);
  }

  function bindWindowResize() {
    if (size !== "full" || windowResizeBound) return;
    windowResizeBound = true;
    window.addEventListener("resize", scheduleMapRelayout);
  }

  function boundsPixelSize(bounds) {
    const ne = bounds.getNorthEast();
    const sw = bounds.getSouthWest();
    const nw = map.latLngToContainerPoint([ne.lat, sw.lng]);
    const se = map.latLngToContainerPoint([sw.lat, ne.lng]);
    return {
      width: Math.abs(se.x - nw.x),
      height: Math.abs(se.y - nw.y),
    };
  }

  function fitMunicipalityView() {
    if (!map || !mapBounds || !mapBounds.isValid()) return;
    map.invalidateSize();
    const wrap = document.querySelector(".widget-map-wrap");
    if (!wrap || wrap.clientWidth < 2 || wrap.clientHeight < 2) return;

    const padX = Math.max(8, Math.round(wrap.clientWidth * 0.015));
    const padY = Math.max(6, Math.round(wrap.clientHeight * 0.02));
    map.fitBounds(mapBounds, { padding: [padY, padX], animate: false });
    let z = map.getZoom();

    const viewW = Math.max(wrap.clientWidth - padX * 2, 1);
    const viewH = Math.max(wrap.clientHeight - padY * 2, 1);
    const size = boundsPixelSize(mapBounds);
    const fillX = size.width / viewW;
    const fillY = size.height / viewH;
    const dominantFill = Math.max(fillX, fillY);
    const targetFill = 0.86;
    const maxZoomBump = isUltraNarrowViewport(wrap.clientWidth) ? 0.85 : 1.1;

    if (dominantFill > 0.05 && dominantFill < targetFill) {
      const zoomDelta = Math.min(maxZoomBump, Math.log2(targetFill / dominantFill));
      z = z + zoomDelta;
    }

    map.setView(mapBounds.getCenter(), z, { animate: false });
    map.setMinZoom(z);
    map.setMaxZoom(z);
  }

  function observeWidgetResize() {
    if (size !== "full" || widgetResizeObserver) return;
    const el = document.querySelector(".widget");
    if (!el || !window.ResizeObserver) return;
    widgetResizeObserver = new ResizeObserver(function () {
      notifyResize();
      if (dailyChart) dailyChart.resize();
      if (!layoutBounds && !mapBounds) return;
      clearTimeout(widgetResizeTimer);
      widgetResizeTimer = setTimeout(scheduleMapRelayout, 80);
    });
    widgetResizeObserver.observe(el);
  }

  function observeMapResize() {
    const viewport = document.querySelector(".widget-visual-viewport");
    if (!viewport) return;
    if (mapResizeObserver) mapResizeObserver.disconnect();
    mapResizeObserver = new ResizeObserver(function () {
      clearTimeout(mapResizeTimer);
      mapResizeTimer = setTimeout(scheduleMapRelayout, 80);
    });
    mapResizeObserver.observe(viewport);
  }

  function teardownMap() {
    if (mapResizeObserver) {
      mapResizeObserver.disconnect();
      mapResizeObserver = null;
    }
    mapBounds = null;
    if (map) {
      map.remove();
      map = null;
    }
    baseLayer = null;
    boundaryLayer = null;
    strikeLayer = null;
    labelsLayer = null;
  }

  async function fetchObcinaGeometry(obMid) {
    try {
      return await fetchJson(`${WIDGET_API}/obcina-geometry?ob_mid=${obMid}`);
    } catch (_) {}
    try {
      if (!obLiteCache) {
        obLiteCache = await fetchJson("/widget/public/data/OB-lite.geojson");
      }
      const f = (obLiteCache.features || []).find(
        (x) => Number(x.properties && x.properties.OB_MID) === Number(obMid)
      );
      if (!f) return null;
      return {
        type: "Feature",
        properties: { ob_mid: obMid, name: f.properties.OB_UIME || "" },
        geometry: f.geometry,
      };
    } catch (_) {
      return null;
    }
  }

  async function fetchSiGeometry() {
    return fetchJson(`${WIDGET_API}/si-geometry`);
  }

  async function fetchJson(url, opts) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 15000);
    try {
      const res = await fetch(url, { credentials: "include", ...opts, signal: ctrl.signal });
      if (!res.ok) throw new Error(String(res.status));
      return res.json();
    } finally {
      clearTimeout(timer);
    }
  }

  function lastStrikeDateFromDaily(daily) {
    let last = null;
    for (const row of daily || []) {
      if ((row.stevilo || 0) < 1 || !row.datum) continue;
      if (!last || row.datum > last) last = row.datum;
    }
    return last;
  }

  async function loadData() {
    if (bootError) throw new Error(bootError);

    if (cfg.strikesLast24h != null && (obMidParam || isNationalScope)) {
      return {
        total_24h: cfg.strikesLast24h,
        strikes: cfg.strikes || [],
        obcina: cfg.municipalityName || (isNationalScope ? "SLOVENIJA" : "Občina"),
        scope: isNationalScope ? "slovenija" : null,
        period_total: cfg.periodTotal != null ? cfg.periodTotal : 0,
        last_strike_time: cfg.lastStrikeTime || null,
        daily: cfg.daily || [],
        period_days: cfg.periodDays || PERIOD_DAYS,
      };
    }

    if (IS_PREVIEW) {
      const payload = await fetchJson(
        `${WIDGET_API}/obcina-widget/preview?token=${encodeURIComponent(previewToken)}`
      );
      const cacheKey = previewCacheKeyFromPayload(payload);
      if (cacheKey) {
        try {
          previewDataCache[cacheKey] = JSON.parse(JSON.stringify(payload));
        } catch (_) {
          previewDataCache[cacheKey] = payload;
        }
        lastPreviewPayload = previewDataCache[cacheKey];
        lastPreviewDataKey = cacheKey;
        notifyParentPreviewCached(cacheKey);
      }
      if (!preserveDisplayConfig) {
        applyTheme(payload.theme);
        size = payload.size === "full" ? "full" : "compact";
      }
      preserveDisplayConfig = false;
      isNationalScope = payload.scope === "slovenija";
      obMidParam = payload.ob_mid || null;
      return hydrateWidgetData(payload, obMidParam, isNationalScope);
    }

    const envelope = await fetchJson(
      `${STRELKO_API}/strelko/obcina-widgets/public/${encodeURIComponent(publicKey)}`
    );
    applyTheme(envelope.theme);
    size = envelope.size === "full" ? "full" : "compact";
    isNationalScope = envelope.scope === "slovenija";
    obMidParam = envelope.ob_mid || null;
    return hydrateWidgetData(envelope.data || {}, obMidParam, isNationalScope);
  }

  async function hydrateWidgetData(data, obMid, national) {
    const b = data.bounds;
    if (b && b.length >= 2) {
      if (!Number.isFinite(lat)) lat = (b[0][0] + b[1][0]) / 2;
      if (!Number.isFinite(lon)) lon = (b[0][1] + b[1][1]) / 2;
    }
    if (!municipalityName) municipalityName = data.obcina || (national ? "SLOVENIJA" : "Občina");
    if (!data.last_strike_time) {
      try {
        if (national) {
          data.daily_last = await fetchJson(`${WIDGET_API}/si-daily?days=365`);
        } else if (obMid) {
          data.daily_last = await fetchJson(`${WIDGET_API}/obcina-daily?ob_mid=${obMid}&days=365`);
        }
      } catch {
        data.daily_last = [];
      }
    }
    return data;
  }

  function buildViewFromData(data) {
    const strikes24h = data.strikes || [];
    const strikesLast24h = data.total_24h != null ? data.total_24h : strikes24h.length;
    const periodDays = data.period_days || PERIOD_DAYS;

    let lastStrikeTime = null;
    let lastStrikeDate = null;
    if (data.last_strike_time) {
      lastStrikeTime = new Date(data.last_strike_time);
      if (isNaN(lastStrikeTime.getTime())) lastStrikeTime = null;
    }
    if (!lastStrikeTime) {
      lastStrikeDate = lastStrikeDateFromDaily(data.daily_last || data.daily);
    }

    const periodTotal = data.period_total != null ? data.period_total : 0;
    return {
      strikesLast24h,
      lastStrikeTime,
      lastStrikeDate,
      thirdLabel: `Zadnjih ${periodDays} dni`,
      thirdValue: formatSlInt(periodTotal),
      thirdIsZero: periodTotal === 0,
      strikes: strikes24h,
      daily: data.daily || [],
      periodDays,
      mapComplete: data.map_complete !== false,
      mapMessage: data.map_message || null,
    };
  }

  function formatTimeSl(d) {
    if (!d || isNaN(d.getTime())) return "—";
    const est = window.StrelkoEstimatedStrikeTime;
    if (est && typeof est.formatEstimatedStrikeDateTime === "function") {
      return est.formatEstimatedStrikeDateTime(d);
    }
    const datePart = d.toLocaleDateString("sl-SI", {
      day: "numeric", month: "numeric", year: "numeric",
      timeZone: "Europe/Ljubljana",
    });
    const parts = new Intl.DateTimeFormat("en-GB", {
      timeZone: "Europe/Ljubljana",
      hour: "2-digit",
      minute: "2-digit",
      hourCycle: "h23",
    }).formatToParts(d);
    const hour = parts.find((p) => p.type === "hour")?.value || "00";
    const minute = parts.find((p) => p.type === "minute")?.value || "00";
    return `${datePart}, ${hour}.${minute}`;
  }

  function formatDateSl(dateStr) {
    if (!dateStr) return "—";
    const d = new Date(String(dateStr).slice(0, 10) + "T12:00:00");
    if (isNaN(d.getTime())) return "—";
    return d.toLocaleDateString("sl-SI", {
      day: "numeric", month: "numeric", year: "numeric",
    });
  }

  function formatLastStrike(lastStrikeTime, lastStrikeDate) {
    if (lastStrikeTime && !isNaN(lastStrikeTime.getTime())) return formatTimeSl(lastStrikeTime);
    if (lastStrikeDate) return formatDateSl(lastStrikeDate);
    return "—";
  }

  function strikeTooltipHtml(s) {
    const est = window.StrelkoEstimatedStrikeTime;
    const when = (est && s && s.ts_utc)
      ? est.formatEstimatedStrikeDateTime(s.ts_utc)
      : "—";
    return `<div class="ob-strike-tip"><strong>Strela</strong><br>${when}</div>`;
  }

  function bindStrikeMarkerTip(marker, s) {
    if (!s || !s.ts_utc || !marker || typeof marker.bindTooltip !== "function") return;
    marker.bindTooltip(strikeTooltipHtml(s), {
      direction: "top",
      opacity: 0.95,
      className: "ob-strike-tip-shell",
    });
  }

  const MAPTILER_NO_CONTROLS = {
    navigationControl: false,
    geolocateControl: false,
    terrainControl: false,
    projectionControl: false,
    scaleControl: false,
  };

  const WIDGET_LOGO_URL = `${STRELKO_SITE}/assets/strelko-logo-mark.png`;
  const WIDGET_LOGO_HTML = `<img src="${WIDGET_LOGO_URL}" alt="" class="widget-logo" width="45" height="40" decoding="async">`;

  function buildDetailUrl() {
    if (detailUrlParam) return detailUrlParam;
    if (Number.isFinite(lat) && Number.isFinite(lon)) {
      const q = new URLSearchParams({ lat: String(lat), lon: String(lon), radius_km: "20" });
      if (municipalityName) q.set("label", municipalityName);
      return `${STRELKO_SITE}/?${q.toString()}`;
    }
    return STRELKO_SITE;
  }

  function navigateToStrelko() {
    window.open(STRELKO_SITE, "_blank", "noopener,noreferrer");
  }

  function bindWidgetNavigation() {
    const widget = document.querySelector(".widget");
    if (!widget || widget.dataset.navBound === "1") return;
    widget.dataset.navBound = "1";
    widget.addEventListener("click", function (ev) {
      if (ev.target.closest("[data-visual-tab]")) return;
      navigateToStrelko();
    });
  }

  function renderLoading() {
    document.getElementById("root").innerHTML = `
      <article class="widget widget--${size}" aria-busy="true" aria-live="polite">
        <div class="widget-state">
          <div class="spinner" role="status" aria-label="Nalaganje"></div>
          Nalaganje podatkov o strelah …
        </div>
      </article>`;
  }

  function renderError() {
    document.getElementById("root").innerHTML = `
      <article class="widget widget--${size}" aria-live="polite">
        <header class="widget-head">
          ${WIDGET_LOGO_HTML}
          <div class="widget-head-text">
            <h1 class="widget-title">Udari strel v občini</h1>
          </div>
        </header>
        <div class="widget-state widget-state--error">
          Podatkov trenutno ni mogoče naložiti.
        </div>
        <footer class="widget-foot">
          Informativni prikaz zagotavlja <strong>Meteoinfo d.o.o.</strong> / <strong>Strelko</strong>.
        </footer>
      </article>`;
  }

  function renderVisualBlock(view) {
    const panel = activeVisualPanel(view);
    const chartOnly = isChartOnlyVisual(view);
    const caption = visualCaptionForPanel(chartOnly ? "chart" : panel, view);
    const mapNotice = view && view.isNational && view.mapMessage
      ? `<p class="widget-map-notice" role="status">${escapeHtml(view.mapMessage)}</p>`
      : "";

    if (chartOnly) {
      return `
      <section class="widget-visual-section widget-visual-section--chart-only" aria-label="Prikaz udarov strel">
        <p class="widget-visual-caption" id="widget-visual-caption">${escapeHtml(caption)}</p>
        <div class="widget-visual-viewport">
          <div id="visual-panel-chart" class="widget-visual-panel widget-visual-panel--chart">
            <div class="widget-chart-wrap">
              <canvas id="daily-chart" role="img" aria-label="Graf strel v zadnjih ${view.periodDays} dneh"></canvas>
            </div>
          </div>
        </div>
      </section>`;
    }

    return `
      <section class="widget-visual-section" aria-label="Prikaz udarov strel">
        <div class="widget-visual-tabs" role="tablist" aria-label="Preklop prikaza">
          <button type="button" class="widget-visual-tab${panel === "map" ? " widget-visual-tab--active" : ""}"
                  role="tab" data-visual-tab="map" aria-selected="${panel === "map" ? "true" : "false"}">
            Zemljevid
          </button>
          <button type="button" class="widget-visual-tab${panel === "chart" ? " widget-visual-tab--active" : ""}"
                  role="tab" data-visual-tab="chart" aria-selected="${panel === "chart" ? "true" : "false"}">
            Graf
          </button>
        </div>
        ${mapNotice}
        <p class="widget-visual-caption" id="widget-visual-caption">${escapeHtml(caption)}</p>
        <div class="widget-visual-viewport">
          <div id="visual-panel-map" class="widget-visual-panel widget-visual-panel--map"${panel !== "map" ? " hidden" : ""}>
            <div class="widget-map-wrap">
              <div id="map" role="img" aria-label="Zemljevid strel v zadnjih 24 urah"></div>
            </div>
          </div>
          <div id="visual-panel-chart" class="widget-visual-panel widget-visual-panel--chart"${panel !== "chart" ? " hidden" : ""}>
            <div class="widget-chart-wrap">
              <canvas id="daily-chart" role="img" aria-label="Graf strel v zadnjih ${view.periodDays} dneh"></canvas>
            </div>
          </div>
        </div>
      </section>`;
  }

  function widgetSubtitle(view) {
    return view.isNational ? "Udari strel" : "Udari strel v občini";
  }

  function lastStrikeLabel(view) {
    return "Zadnja zaznana strela";
  }

  function renderWidget(view) {
    const showVisual = view.showMap;
    const visualBlock = showVisual ? renderVisualBlock(view) : "";

    document.getElementById("root").innerHTML = `
      <article class="widget widget--${size}" aria-live="polite">
        <header class="widget-head">
          ${WIDGET_LOGO_HTML}
          <div class="widget-head-text">
            <p class="widget-subtitle">${escapeHtml(widgetSubtitle(view))}</p>
            ${view.municipalityName ? `<h1 class="widget-muni">${escapeHtml(view.municipalityName)}</h1>` : `<h1 class="widget-title">${escapeHtml(widgetSubtitle(view))}</h1>`}
          </div>
        </header>
        <div class="widget-body">
          <div class="stats-grid">
            <div class="stat-card">
              <p class="stat-label">Zadnjih 24 ur</p>
              <p class="stat-value" aria-label="Število udarov v zadnjih 24 urah">${formatSlInt(view.strikesLast24h)}</p>
            </div>
            <div class="stat-card">
              <p class="stat-label">${escapeHtml(view.thirdLabel)}</p>
              <p class="stat-value">${view.thirdValue}</p>
            </div>
            <div class="stat-card">
              <p class="stat-label">${escapeHtml(lastStrikeLabel(view))}</p>
              <p class="stat-value${view.lastStrikeTime || view.lastStrikeDate ? "" : " stat-value--zero"}">${formatLastStrike(view.lastStrikeTime, view.lastStrikeDate)}</p>
            </div>
          </div>
        </div>
        ${visualBlock}
        <footer class="widget-foot">
          Informativni prikaz zagotavlja <strong>Meteoinfo d.o.o.</strong> / <strong>Strelko</strong>.
        </footer>
      </article>`;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }
  function escapeAttr(s) {
    return escapeHtml(s).replace(/'/g, "&#39;");
  }

  function maptilerStyleUrl(styleId) {
    return `https://api.maptiler.com/maps/${styleId}/style.json?key=${encodeURIComponent(MAPTILER_KEY)}`;
  }

  function canUseMaptilerPlugin() {
    return !!(MAPTILER_KEY && L.maptiler && typeof L.maptiler.maptilerLayer === "function");
  }

  function syncWidgetMapAttribution(targetMap) {
    const ctrl = targetMap && targetMap.attributionControl;
    if (!ctrl) return;
    ctrl.setPrefix("");
    for (let i = 0; i < 6; i += 1) {
      ctrl.removeAttribution(MAPTILER_SDK_ATTRIBUTION);
      ctrl.removeAttribution(MAP_ATTRIBUTION);
    }
    ctrl.addAttribution(MAP_ATTRIBUTION);
  }

  function createBaseLayer() {
    return L.tileLayer(
      `https://api.maptiler.com/maps/${STYLE_BASE}/{z}/{x}/{y}.png?key=${encodeURIComponent(MAPTILER_KEY)}`,
      {
        attribution: MAP_ATTRIBUTION,
        maxZoom: 14,
        tileSize: 512,
        zoomOffset: -1,
      }
    );
  }

  function createKrajiLayer() {
    if (!canUseMaptilerPlugin()) return null;
    try {
      return L.maptiler.maptilerLayer({
        apiKey: MAPTILER_KEY,
        style: maptilerStyleUrl(STYLE_KRAJI),
        attribution: "",
        attributionControl: false,
        pane: "maptilerOverlayPane",
        ...MAPTILER_NO_CONTROLS,
      });
    } catch (_) {
      return null;
    }
  }

  function renderObcinaMap(strikes, feature, useCanvas) {
    const el = document.getElementById("map");
    if (!el || !feature) return;
    const hasGeometry = feature.type === "FeatureCollection"
      ? Array.isArray(feature.features) && feature.features.length > 0
      : !!feature.geometry;
    if (!hasGeometry) return;

    const wrap = el.closest(".widget-map-wrap");
    const preBounds = boundsFromFeature(feature);
    if (preBounds) applyMapFrame(preBounds);
    else ensureVisualWrapHeight(wrap);

    if (!map) {
      map = L.map(el, {
        zoomControl: false,
        attributionControl: true,
        dragging: false,
        touchZoom: false,
        doubleClickZoom: false,
        boxZoom: false,
        keyboard: false,
        scrollWheelZoom: false,
        preferCanvas: !!useCanvas,
      });
      map.createPane("maptilerOverlayPane");
      map.getPane("maptilerOverlayPane").style.zIndex = 450;
      map.createPane("boundaryPane");
      map.getPane("boundaryPane").style.zIndex = 480;

      baseLayer = createBaseLayer();
      baseLayer.addTo(map);

      labelsLayer = createKrajiLayer();
      if (labelsLayer) {
        labelsLayer.on("add", () => syncWidgetMapAttribution(map));
        labelsLayer.on("ready", () => syncWidgetMapAttribution(map));
        labelsLayer.addTo(map);
      }
      syncWidgetMapAttribution(map);
    }

    if (boundaryLayer) map.removeLayer(boundaryLayer);
    boundaryLayer = L.geoJSON(feature, {
      pane: "boundaryPane",
      style: {
        color: getComputedStyle(document.body).getPropertyValue("--map-boundary").trim() || "#0588a8",
        weight: 2,
        fillColor: getComputedStyle(document.body).getPropertyValue("--map-boundary").trim() || "#0588a8",
        fillOpacity: theme === "dark" ? 0.15 : 0.1,
      },
      interactive: false,
    }).addTo(map);

    if (useCanvas) {
      if (!strikeCanvasRenderer) {
        strikeCanvasRenderer = L.canvas({ padding: 0.5 });
      }
    } else {
      strikeCanvasRenderer = null;
    }

    if (strikeLayer) map.removeLayer(strikeLayer);
    strikeLayer = L.layerGroup();
    const markerOpts = useCanvas
      ? {
          radius: 1.15,
          color: "#e8a008",
          fillColor: "#e8a008",
          fillOpacity: 0.9,
          weight: 0,
        }
      : {
          radius: 2.5,
          color: "#e8a008",
          fillColor: "#e8a008",
          fillOpacity: 0.85,
          weight: 0,
        };
    if (useCanvas && strikeCanvasRenderer) {
      markerOpts.renderer = strikeCanvasRenderer;
    }
    (strikes || []).forEach(function (s) {
      if (s.lat == null || s.lon == null) return;
      const marker = L.circleMarker([s.lat, s.lon], markerOpts);
      if (!useCanvas) bindStrikeMarkerTip(marker, s);
      marker.addTo(strikeLayer);
    });
    strikeLayer.addTo(map);

    const bounds = boundaryLayer.getBounds();
    if (bounds.isValid()) {
      applyMapFrame(bounds);
      requestAnimationFrame(function () {
        fitMunicipalityView();
        observeMapResize();
        notifyResize();
      });
    }
  }

  let loadedOnce = false;

  async function renderFromWidgetData(data, loadId) {
    const national = isNationalScope || data.scope === "slovenija";
    municipalityName = data.obcina || (national ? "SLOVENIJA" : "Občina");

    const stats = buildViewFromData(data);
    if (loadId !== previewLoadSeq) return;
    const showMap = size === "full";
    if (showMap) {
      await ensureHeavyLibs();
      if (loadId !== previewLoadSeq) return;
      teardownMap();
      destroyDailyChart();
    }

    const view = {
      municipalityName,
      isNational: national,
      showMap,
      strikesLast24h: stats.strikesLast24h,
      lastStrikeTime: stats.lastStrikeTime,
      lastStrikeDate: stats.lastStrikeDate,
      thirdLabel: stats.thirdLabel,
      thirdValue: stats.thirdValue,
      thirdIsZero: stats.thirdIsZero,
      detailUrl: buildDetailUrl(),
      strikes: stats.strikes,
      daily: stats.daily,
      periodDays: stats.periodDays,
      mapComplete: stats.mapComplete,
      mapMessage: stats.mapMessage,
      obMid: national ? null : (data.ob_mid || obMidParam),
    };

    renderWidget(view);
    loadedOnce = true;
    bindWidgetNavigation();

    if (showMap) {
      const scopeKey = visualScopeKey(view);
      if (lastVisualScopeKey !== scopeKey || view.strikesLast24h <= 0) {
        userVisualPanel = null;
      }
      lastVisualScopeKey = scopeKey;
      mountVisualPanel(view);
      observeWidgetResize();
      bindWindowResize();
    } else {
      userVisualPanel = null;
      lastVisualScopeKey = null;
    }

    notifyResize();
  }

  async function loadFromCachedPayload(payload) {
    const loadId = ++previewLoadSeq;
    if (!loadedOnce || previewForceLoading) {
      renderLoading();
      previewForceLoading = false;
    }
    try {
      isNationalScope = payload.scope === "slovenija";
      obMidParam = payload.ob_mid || null;
      municipalityName = "";
      lat = NaN;
      lon = NaN;
      const data = await hydrateWidgetData(
        Object.assign({}, payload),
        obMidParam,
        isNationalScope
      );
      if (loadId !== previewLoadSeq) return;
      await renderFromWidgetData(data, loadId);
    } catch (e) {
      if (loadId !== previewLoadSeq) return;
      if (!loadedOnce) renderError();
      notifyResize();
    }
  }

  async function load() {
    const loadId = ++previewLoadSeq;
    if (!loadedOnce || previewForceLoading) {
      renderLoading();
      previewForceLoading = false;
    }
    try {
      const data = await loadData();
      if (loadId !== previewLoadSeq) return;
      await renderFromWidgetData(data, loadId);
    } catch (e) {
      if (loadId !== previewLoadSeq) return;
      if (!loadedOnce) renderError();
      notifyResize();
    }
  }

  function widgetContentHeight() {
    const widget = document.querySelector(".widget");
    if (widget) return Math.ceil(widget.getBoundingClientRect().height);
    return Math.ceil(document.documentElement.scrollHeight);
  }

  function notifyResize() {
    if (window.parent === window) return;
    requestAnimationFrame(function () {
      const height = widgetContentHeight();
      if (height > 0) {
        window.parent.postMessage({
          type: "strele-embed-resize",
          height: height,
        }, "*");
      }
    });
  }

  window.addEventListener("load", function () {
    notifyResize();
    if (currentView && size === "full") {
      scheduleVisualPanel(currentView, activeVisualPanel(currentView));
    }
  });

  load();
  if (!IS_PREVIEW) setInterval(load, REFRESH_MS);
})();
</script>
</body>
</html>
